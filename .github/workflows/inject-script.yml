name: Inject backtest script tag

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inject-script.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Restore index.html from good commit
        run: |
          git checkout f63f63cea427a9f07a4ed672a61937c926f9d5dd -- index.html
          echo "Restored index.html from commit f63f63c"
          wc -c index.html

      - name: Commit and push restored file
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet; then
            echo 'No changes needed'
          else
            git add index.html
            git commit -m 'fix: index.html 원본 복구 (ef75e0a 손상 파일 되돌리기)'
            git push origin HEAD:main
          fi
