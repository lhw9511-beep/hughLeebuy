name: Inject backtest script tag

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inject-script.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Insert inject-backtest.js before </body>
        run: |
          python3 - <<'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          tag = '    <script src="inject-backtest.js"></script>'
          if tag not in content:
              content = content.replace('</body>', tag + '\n</body>')
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print('PATCHED')
          else:
              print('SKIP: already present')
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet; then
            echo 'No changes to commit'
          else
            git add index.html
            git commit -m 'fix: inject-backtest.js 스크립트 태그 삽입'
            git push origin HEAD:main
          fi
