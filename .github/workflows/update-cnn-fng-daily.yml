name: update-cnn-fng-daily

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update daily CNN Fear & Greed cache from CNN page
        run: |
          python - << 'PYEOF'
          import json, os, re, urllib.request
          from datetime import datetime, timezone

          url = 'https://www.cnn.com/markets/fear-and-greed'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=30) as r:
              html = r.read().decode('utf-8', errors='ignore')

          patterns = [
              r'Fear & Greed Now[:\\s-]*([0-9]{1,3})',
              r'Fear and Greed Now[:\\s-]*([0-9]{1,3})',
              r'index\\D{0,40}([0-9]{1,3})\\D{0,40}(?:Extreme Fear|Fear|Neutral|Greed|Extreme Greed)',
              r'(?:Extreme Fear|Fear|Neutral|Greed|Extreme Greed)\\D{0,40}([0-9]{1,3})',
          ]
          score = None
          for p in patterns:
              m = re.search(p, html, re.I | re.S)
              if m:
                  try:
                      v = int(m.group(1))
                      if 0 <= v <= 100:
                          score = v
                          break
                  except Exception:
                      pass

          if score is None:
              nums = [int(x) for x in re.findall(r'>([0-9]{1,3})<', html)]
              nums = [x for x in nums if 0 <= x <= 100]
              if nums:
                  score = nums[0]

          if score is None:
              raise SystemExit('Unable to parse CNN Fear & Greed score from public page')

          if score <= 24:
              rating = 'Extreme Fear'
          elif score <= 44:
              rating = 'Fear'
          elif score <= 55:
              rating = 'Neutral'
          elif score <= 74:
              rating = 'Greed'
          else:
              rating = 'Extreme Greed'

          out = {
              'score': score,
              'rating': rating,
              'updated_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'source': 'cnn-public-page',
              'source_url': url,
              'note': 'Daily cached value. Updated by GitHub Actions once per day from CNN public page.'
          }

          os.makedirs('data', exist_ok=True)
          with open('data/cnn-fng.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print(out)
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cnn-fng.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: daily CNN fear & greed cache update"
          git push
