<!DOCTYPE html>
<html lang="ko" class="theme-default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUY or BYE | AI Precision Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        themeBg: 'var(--bg-color)', 
                        themePanel: 'var(--panel-color)', 
                        themeModal: 'var(--modal-bg)',
                        themeText: 'var(--text-main)',
                        themeMuted: 'var(--text-muted)',
                        themeBorder: 'var(--border-color)',
                        accent: '#3B82F6', 
                        up: '#26A69A', 
                        down: '#EF5350' 
                    } 
                } 
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* 동적 테마 설정 */
        :root, .theme-default {
            --bg-color: #0B0E11;
            --panel-color: rgba(21, 25, 33, 0.8);
            --modal-bg: #151921;
            --text-main: #ffffff;
            --text-muted: #9CA3AF;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        .theme-light {
            --bg-color: #f3f4f6;
            --panel-color: rgba(255, 255, 255, 0.95);
            --modal-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-color: rgba(0, 0, 0, 0.15);
        }
        .theme-navy {
            --bg-color: #0f172a;
            --panel-color: rgba(30, 41, 59, 0.8);
            --modal-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        .theme-purple {
            --bg-color: #171026;
            --panel-color: rgba(37, 26, 58, 0.8);
            --modal-bg: #251a3a;
            --text-main: #f3e8ff;
            --text-muted: #a855f7;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        .theme-green {
            --bg-color: #022c22;
            --panel-color: rgba(6, 78, 59, 0.8);
            --modal-bg: #064e3b;
            --text-main: #ecfdf5;
            --text-muted: #34d399;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* STRONG 신호 시각적 글로우 효과 */
        .status-STRONG-BUY { color: #10B981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.8); }
        .status-BUY { color: #34D399; }
        .status-HOLD { color: var(--text-muted); }
        .status-BYE { color: #F87171; }
        .status-STRONG-BYE { color: #EF4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.8); }

        /* 기본 전역 스타일 */
        html { font-size: 16px; transition: font-size 0.2s ease; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', 'Pretendard', sans-serif; overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; }
        .glass { background: var(--panel-color); backdrop-filter: blur(12px); border: 1px solid var(--border-color); transition: background 0.3s ease, border-color 0.3s ease; }
        
        .chart-container { height: 400px; width: 100%; }
        @media (min-width: 1024px) { .chart-container { height: 500px; } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 10px; }
        
        /* 버튼 스타일 */
        .chip-btn { padding: 0.3rem 0.75rem; font-size: 0.75rem; font-weight: 800; border-radius: 0.5rem; background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); transition: all 0.2s; white-space: nowrap; cursor: pointer; }
        .chip-btn:hover { border-color: #3B82F6; color: var(--text-main); }
        .chip-btn.active { background-color: #3B82F6; border-color: #3B82F6; color: white; }

        .setting-btn { border: 1px solid var(--border-color); background: transparent; color: var(--text-muted); padding: 0.4rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: bold; flex: 1; text-align: center; cursor: pointer; transition: all 0.2s; }
        .setting-btn.active { background: #3B82F6; color: white; border-color: #3B82F6; }

        /* 모달 및 로딩 */
        #loading-overlay { display: none; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 50; align-items: center; justify-content: center; border-radius: 1.5rem; flex-direction: column; }
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { max-width: 500px; width: 100%; background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        
        .theme-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .theme-btn.active { border-color: #3B82F6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.6); }

        /* 통계 박스 */
        .stat-box { background: rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color); border-radius: 12px; padding: 0.75rem; display: flex; flex-direction: column; justify-content: space-between; }
        .stat-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 900; display: flex; align-items: center; gap: 4px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 900; margin-top: 6px; }
        
        .perspective-col { cursor: pointer; transition: all 0.2s; border-radius: 12px; padding: 0.75rem; border: 1px solid var(--border-color); text-align: center; background: rgba(0,0,0,0.1); }
        .perspective-col:hover { background: rgba(0,0,0,0.2); transform: translateY(-2px); border-color: #3B82F6; }

        .signal-badge { font-weight: 900; font-size: 0.65rem; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
        .signal-up { background-color: rgba(38, 166, 154, 0.2); color: #26A69A; }
        .signal-down { background-color: rgba(239, 83, 80, 0.2); color: #EF5350; }
        .signal-neutral { background-color: rgba(107, 114, 128, 0.2); color: #9CA3AF; }

        /* 툴팁 */
        .info-tip { cursor: help; display: inline-flex; align-items: center; position: relative; }
        .info-tip:hover { color: var(--text-main); }
        .icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-2 md:p-4 lg:p-6">

    <!-- 환경 설정 모달 -->
    <div id="settings-modal" class="modal-overlay" onclick="closeSettingsModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6 border-b border-themeBorder pb-4">
                <h3 class="text-lg font-black text-themeText flex items-center">
                    <svg class="icon text-accent mr-2" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    대시보드 설정
                </h3>
                <button onclick="closeSettingsModal()" class="text-themeMuted hover:text-accent"><svg width="24" height="24" class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="space-y-6">
                <!-- 테마 -->
                <div>
                    <p class="text-[0.7rem] text-themeMuted font-bold mb-3 uppercase tracking-widest">배경 테마</p>
                    <div class="flex flex-wrap gap-4">
                        <div class="flex flex-col items-center gap-1"><button onclick="setTheme('theme-default')" id="btn-theme-default" class="theme-btn active" style="background-color: #0B0E11;"></button><span class="text-[0.6rem] text-themeMuted font-bold">Black</span></div>
                        <div class="flex flex-col items-center gap-1"><button onclick="setTheme('theme-light')" id="btn-theme-light" class="theme-btn" style="background-color: #f3f4f6; border-color:#ccc;"></button><span class="text-[0.6rem] text-themeMuted font-bold">White</span></div>
                        <div class="flex flex-col items-center gap-1"><button onclick="setTheme('theme-navy')" id="btn-theme-navy" class="theme-btn" style="background-color: #0f172a;"></button><span class="text-[0.6rem] text-themeMuted font-bold">Navy</span></div>
                        <div class="flex flex-col items-center gap-1"><button onclick="setTheme('theme-purple')" id="btn-theme-purple" class="theme-btn" style="background-color: #171026;"></button><span class="text-[0.6rem] text-themeMuted font-bold">Purple</span></div>
                        <div class="flex flex-col items-center gap-1"><button onclick="setTheme('theme-green')" id="btn-theme-green" class="theme-btn" style="background-color: #022c22;"></button><span class="text-[0.6rem] text-themeMuted font-bold">Green</span></div>
                    </div>
                </div>

                <!-- 이평선 설정 (메인 화면에서 이동) -->
                <div class="border-t border-themeBorder pt-4">
                    <p class="text-[0.7rem] text-themeMuted font-bold mb-3 uppercase tracking-widest">이동평균선 (MA) 표시</p>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="toggleMA(20)" id="btn-ma-20" class="setting-btn active">MA 20</button>
                        <button onclick="toggleMA(50)" id="btn-ma-50" class="setting-btn active">MA 50</button>
                        <button onclick="toggleMA(60)" id="btn-ma-60" class="setting-btn">MA 60</button>
                        <button onclick="toggleMA(120)" id="btn-ma-120" class="setting-btn active">MA 120</button>
                        <button onclick="toggleMA(200)" id="btn-ma-200" class="setting-btn active">MA 200</button>
                    </div>
                </div>

                <div class="border-t border-themeBorder pt-4">
                    <p class="text-[0.7rem] text-themeMuted font-bold mb-3 uppercase tracking-widest">글자 크기 조절</p>
                    <div class="flex gap-2">
                        <button onclick="setFontSize('sm')" id="btn-font-sm" class="setting-btn">작게</button>
                        <button onclick="setFontSize('md')" id="btn-font-md" class="setting-btn active">보통</button>
                        <button onclick="setFontSize('lg')" id="btn-font-lg" class="setting-btn">크게</button>
                    </div>
                </div>

                <div class="border-t border-themeBorder pt-4">
                    <p class="text-[0.7rem] text-themeMuted font-bold mb-3 uppercase tracking-widest">차트 선 굵기</p>
                    <div class="flex gap-2">
                        <button onclick="setLineWidth('1')" id="btn-line-1" class="setting-btn">얇게</button>
                        <button onclick="setLineWidth('2')" id="btn-line-2" class="setting-btn active">보통</button>
                        <button onclick="setLineWidth('3')" id="btn-line-3" class="setting-btn">두껍게</button>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-end">
                <button onclick="closeSettingsModal()" class="bg-accent text-white px-6 py-2.5 rounded-xl text-sm font-black hover:bg-blue-600 w-full md:w-auto">적용 완료</button>
            </div>
        </div>
    </div>

    <!-- 디테일 팝업 모달 -->
    <div id="detail-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 id="modal-title" class="text-xl font-black text-themeText uppercase italic">Detail</h3>
                    <p id="modal-period" class="text-[0.7rem] text-accent font-black tracking-widest uppercase mt-1">---</p>
                </div>
                <button onclick="closeModal()" class="text-themeMuted hover:text-accent p-2"><svg width="24" height="24" class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
            </div>
            <div id="modal-body" class="space-y-4 text-sm text-themeText"></div>
            <div class="mt-6 flex justify-end">
                <button onclick="closeModal()" class="bg-themeBorder text-themeText px-6 py-2.5 rounded-xl text-sm font-black w-full md:w-auto hover:bg-white/10 border border-white/5">창 닫기</button>
            </div>
        </div>
    </div>

    <div class="max-w-[1400px] mx-auto w-full flex-grow flex flex-col space-y-4 relative">
        
        <!-- 통합 헤더 -->
        <header class="glass p-4 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm">
            <div class="flex w-full sm:w-auto justify-between items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="resetDashboard()">
                    <div class="bg-accent p-1.5 rounded-lg shadow-md shadow-accent/40">
                        <svg class="icon text-white" width="24" height="24" viewBox="0 0 24 24"><path d="M23 6l-9.5 9.5-5-5L1 18"></path><path d="M17 6h6v6"></path></svg>
                    </div>
                    <h1 class="text-xl font-black italic text-themeText tracking-tighter">BUY <span class="text-accent">or BYE</span></h1>
                </div>
                <!-- 톱니바퀴 (모바일 & 데스크톱 통일) -->
                <button onclick="openSettingsModal()" class="sm:hidden p-2 bg-themeModal border border-themeBorder rounded-xl text-themeMuted hover:text-accent transition shadow-sm">
                    <svg width="24" height="24" class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 items-center w-full sm:w-auto flex-grow justify-end">
                <form id="search-form" class="flex w-full sm:w-auto max-w-sm">
                    <input type="text" id="ticker-input" class="w-full bg-[var(--modal-bg)] border border-[var(--border-color)] text-themeText rounded-l-xl px-4 py-2 uppercase outline-none focus:border-accent text-sm font-black shadow-inner" value="SPY" placeholder="종목 검색">
                    <button type="submit" class="bg-accent text-white px-5 py-2 rounded-r-xl font-black text-sm hover:bg-blue-600 transition shrink-0">분석</button>
                </form>
                <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
                    <div id="status-text" class="flex items-center gap-1.5 shrink-0">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
                        <span id="conn-label" class="text-[0.65rem] font-bold text-themeMuted tracking-widest">WAITING</span>
                    </div>
                    <button onclick="openSettingsModal()" class="hidden sm:block p-2 bg-themeModal border border-themeBorder rounded-xl text-themeMuted hover:text-accent transition shadow-sm">
                        <svg width="24" height="24" class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- 차트 영역 -->
        <div class="glass rounded-2xl p-4 flex flex-col shadow-xl relative min-h-[450px]">
            <div id="loading-overlay">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-accent mb-3"></div>
                <p id="loading-text" class="text-[0.65rem] font-bold text-accent uppercase tracking-widest text-center">Processing Data...</p>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 border-b border-themeBorder pb-4 gap-4">
                <div>
                    <h2 id="display-ticker" class="text-4xl font-black text-themeText uppercase tracking-tighter leading-none mb-1">---</h2>
                    <div id="live-price" class="text-2xl font-mono font-black text-themeText">---</div>
                </div>
                
                <!-- 차트 컨트롤 (Timeframe Only) -->
                <div class="w-full sm:w-auto">
                    <p class="text-[0.6rem] font-black text-themeMuted mb-1 uppercase tracking-widest">Period</p>
                    <div class="flex flex-wrap gap-1">
                        <button onclick="changeInterval('1d', '1y', 'D')" id="range-D" class="chip-btn active">일봉</button>
                        <button onclick="changeInterval('1wk', '2y', 'W')" id="range-W" class="chip-btn">주봉</button>
                        <button onclick="changeInterval('1mo', '5y', 'M')" id="range-M" class="chip-btn">월봉</button>
                        <button onclick="changeInterval('1y', 'max', 'Y')" id="range-Y" class="chip-btn">연봉</button>
                        <button onclick="changeInterval('1mo', 'max', 'MAX')" id="range-MAX" class="chip-btn">MAX</button>
                    </div>
                </div>
            </div>

            <div id="chart-main" class="chart-container flex-grow"></div>
        </div>

        <!-- 분석 영역 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            
            <!-- 마스터 인텔리전스 -->
            <div class="glass rounded-2xl p-4 lg:col-span-1 flex flex-col shadow-xl border-t-4 border-t-accent">
                <div class="flex items-center gap-1.5 mb-4">
                    <svg class="w-4 h-4 text-accent icon" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    <p class="text-themeMuted text-[0.65rem] font-black uppercase tracking-widest">Master Intelligence</p>
                </div>
                
                <div class="grid grid-cols-3 gap-2 flex-grow">
                    <div class="perspective-col" onclick="showDetail('short')">
                        <p class="text-[0.55rem] font-black text-themeMuted mb-1 tracking-widest border-b border-themeBorder pb-1">SHORT</p>
                        <div id="st-signal-text" class="text-sm font-black italic text-themeMuted">WAIT</div>
                    </div>
                    <div class="perspective-col" onclick="showDetail('mid')">
                        <p class="text-[0.55rem] font-black text-themeMuted mb-1 tracking-widest border-b border-themeBorder pb-1">MID</p>
                        <div id="mt-signal-text" class="text-sm font-black italic text-themeMuted">WAIT</div>
                    </div>
                    <div class="perspective-col" onclick="showDetail('long')">
                        <p class="text-[0.55rem] font-black text-themeMuted mb-1 tracking-widest border-b border-themeBorder pb-1">LONG</p>
                        <div id="lt-signal-text" class="text-sm font-black italic text-themeMuted">WAIT</div>
                    </div>
                </div>
            </div>

            <!-- 통합 분석 레포트 -->
            <div class="glass rounded-2xl p-4 lg:col-span-2 shadow-xl border-t-4 border-t-emerald-500 flex flex-col">
                <div class="flex items-center gap-1.5 mb-4 border-b border-themeBorder pb-3">
                    <svg class="w-4 h-4 text-emerald-500 icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    <p class="text-themeText text-[0.65rem] font-black uppercase tracking-widest">통합 분석 레포트</p>
                </div>
                
                <!-- 5대 지표 -->
                <div class="grid grid-cols-2 sm:grid-cols-5 gap-2 mb-4">
                    <div class="stat-box">
                        <p class="stat-label">이격도 <span class="info-tip" title="현재가와 120일선 간의 거리(%). 장기 추세 방향성 판단."><svg class="w-3 h-3 text-accent icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01" stroke-width="3"></path></svg></span></p>
                        <p id="val-ma-dist" class="stat-value text-themeText">---</p>
                    </div>
                    <div class="stat-box">
                        <p class="stat-label">RSI(14) <span class="info-tip" title="상대강도지수. 30 이하 과매도(바닥권), 70 이상 과매수(고점권)."><svg class="w-3 h-3 text-accent icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01" stroke-width="3"></path></svg></span></p>
                        <p id="val-rsi-main" class="stat-value text-themeText">---</p>
                    </div>
                    <div class="stat-box">
                        <p class="stat-label">MACD <span class="info-tip" title="이평선 수렴/발산. 양수는 상승, 음수는 하락 에너지."><svg class="w-3 h-3 text-accent icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01" stroke-width="3"></path></svg></span></p>
                        <p id="val-macd-main" class="stat-value text-themeText">---</p>
                    </div>
                    <div class="stat-box">
                        <p class="stat-label">BB밴드 <span class="info-tip" title="볼린저 밴드. 상단 돌파 시 과열, 하단 이탈 시 침체."><svg class="w-3 h-3 text-accent icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01" stroke-width="3"></path></svg></span></p>
                        <p id="val-bb-main" class="stat-value text-themeText">---</p>
                    </div>
                    <div class="stat-box">
                        <p class="stat-label">Stoch <span class="info-tip" title="스토캐스틱 %K. 20이하 침체, 80이상 과열."><svg class="w-3 h-3 text-accent icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01" stroke-width="3"></path></svg></span></p>
                        <p id="val-stoch-main" class="stat-value text-themeText">---</p>
                    </div>
                </div>

                <!-- 분석 텍스트 컨테이너 -->
                <div id="reasoning-container" class="space-y-2 overflow-y-auto pr-1 custom-scroll max-h-[250px]">
                    <p class="text-xs text-themeMuted text-center py-10">데이터를 분석 중입니다...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 안전 장치 (브라우저 스토리지 에러 방지)
        function safeStorageGet(key, defaultVal) { try { return localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } }
        function safeStorageSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }

        let myChart = null;
        
        // 배포용 상대경로 API 통신
        const API_BASE_URL = ''; 

        // 이평선 설정 (50, 200 추가)
        let maSettings = { 10: false, 20: true, 50: true, 60: false, 120: true, 200: true };
        let currentInterval = '1d';
        let currentRange = '1y';
        let globalChartData = null;
        let globalTicker = "SPY";
        let abortController = null;
        let analysisDetails = { short: {}, mid: {}, long: {} };

        // 설정 로드
        const savedTheme = safeStorageGet('dashboardTheme', 'theme-default');
        const savedFontSize = safeStorageGet('dashboardFontSize', 'md');
        let chartLineWidth = safeStorageGet('dashboardLineWidth', '2');
        
        // --- 모달 제어 ---
        function openSettingsModal() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; }
        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
        
        // --- 설정 반영 ---
        function setTheme(themeName) {
            document.documentElement.className = themeName;
            safeStorageSet('dashboardTheme', themeName);
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById(`btn-${themeName}`);
            if(btn) btn.classList.add('active');
            if (globalChartData && myChart) renderDashboard(globalTicker, globalChartData);
        }

        function setFontSize(size) {
            const sizeMap = { 'sm': '14px', 'md': '16px', 'lg': '18px' };
            document.documentElement.style.fontSize = sizeMap[size];
            safeStorageSet('dashboardFontSize', size);
            document.querySelectorAll("[id^='btn-font-']").forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(`btn-font-${size}`);
            if(btn) btn.classList.add('active');
            if(myChart) myChart.resize();
        }

        function setLineWidth(width) {
            chartLineWidth = width;
            safeStorageSet('dashboardLineWidth', width);
            document.querySelectorAll("[id^='btn-line-']").forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(`btn-line-${width}`);
            if(btn) btn.classList.add('active');
            if(globalChartData && myChart) renderDashboard(globalTicker, globalChartData);
        }

        // --- 지표 계산 엔진 ---
        const Indicator = {
            sma: (d, p) => d.map((_, i) => { if (i < p - 1) return null; const slice = d.slice(i - p + 1, i + 1).filter(v => v !== null); return slice.length === p ? slice.reduce((a, b) => a + b) / p : null; }),
            ema: (d, p) => { let r = Array(d.length).fill(null), k = 2 / (p + 1); let s = d.findIndex(v => v !== null); if (s === -1) return r; let e = d[s]; r[s] = e; for (let i = s + 1; i < d.length; i++) { if (d[i] !== null) { e = (d[i] * k) + (e * (1 - k)); r[i] = e; } } return r; },
            macd: (d, s, l, sig) => { const se = Indicator.ema(d, s), le = Indicator.ema(d, l); const line = se.map((v, i) => (v === null || le[i] === null) ? null : v - le[i]); const signal = Indicator.ema(line, sig); return { line, signal, hist: line.map((v, i) => (v === null || signal[i] === null) ? null : v - signal[i]) }; },
            rsi: (d, p) => { let r = Array(d.length).fill(null), g = 0, l = 0; for (let i = 1; i < d.length; i++) { let diff = d[i] - d[i - 1]; let cg = diff > 0 ? diff : 0, cl = diff < 0 ? -diff : 0; g = ((g * (p - 1)) + cg) / p; l = ((l * (p - 1)) + cl) / p; if (i >= p) r[i] = (l === 0) ? 100 : 100 - (100 / (1 + g / l)); } return r; },
            bollinger: (d, p, mult) => { 
                const sma = Indicator.sma(d, p); const up = Array(d.length).fill(null); const low = Array(d.length).fill(null); 
                for(let i=p-1; i<d.length; i++){ 
                    if(sma[i]===null) continue;
                    const slice = d.slice(i-p+1, i+1).filter(v=>v!==null); 
                    const variance = slice.reduce((acc, val)=>acc+Math.pow(val-sma[i],2),0)/p; 
                    const std = Math.sqrt(variance); 
                    up[i] = sma[i]+(mult*std); low[i] = sma[i]-(mult*std); 
                } 
                return { upper: up, lower: low }; 
            },
            stochastic: (kData, p, smooth) => { 
                let r = Array(kData.length).fill(null); 
                for(let i=p-1; i<kData.length; i++){ 
                    const slice = kData.slice(i-p+1, i+1); 
                    const high = Math.max(...slice.map(d=>d[3])); const low = Math.min(...slice.map(d=>d[2])); 
                    if(high !== low) r[i] = ((kData[i][1] - low) / (high - low)) * 100; else r[i] = 50; 
                } 
                return { k: r, d: Indicator.sma(r, smooth) }; 
            }
        };

        function resetDashboard() { location.reload(); }
        function toggleMA(p) { maSettings[p] = !maSettings[p]; updateMAButtons(); if (globalChartData) renderDashboard(globalTicker, globalChartData); }
        function updateMAButtons() { Object.keys(maSettings).forEach(p => { const b = document.getElementById(`btn-ma-${p}`); if(b) { if (maSettings[p]) b.classList.add('active'); else b.classList.remove('active'); }}); }
        function changeInterval(i, r, l) { currentInterval = i; currentRange = r; document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active')); document.getElementById(`range-${l}`).classList.add('active'); loadData(globalTicker, i, r); }

        function showDetail(p) {
            const m = document.getElementById('detail-modal');
            const d = analysisDetails[p];
            if (!d.status) return;
            m.style.display = 'flex';
            document.getElementById('modal-title').innerText = `${p.toUpperCase()} View`;
            document.getElementById('modal-period').innerText = p==='short'?'분석 범위: 1-20일 (단기 모멘텀)':(p==='mid'?'분석 범위: 20-60일 (중기 추세 스윙)':'분석 범위: 60일 이상 (장기 펀더멘털)');
            
            let statusClass = `status-${d.status.replace(/ /g, '-')}`;
            
            document.getElementById('modal-body').innerHTML = `
                <div class="bg-[var(--border-color)] p-4 rounded-xl text-center shadow-inner opacity-80 border border-themeBorder">
                    <span class="text-4xl font-black italic uppercase ${statusClass}">${d.status}</span>
                    <p class="text-xs text-themeMuted mt-2">${d.summary}</p>
                </div>
                <div class="grid grid-cols-1 gap-3 mt-4">
                    <div class="p-4 bg-[var(--modal-bg)] rounded-xl border border-themeBorder">
                        <p class="text-[11px] font-black text-emerald-500 uppercase mb-1">AI 전략적 조언</p>
                        <p class="text-xs text-themeMuted leading-relaxed">${d.advice}</p>
                    </div>
                </div>
            `;
        }

        async function fetchWithRetry(url, options = {}, maxRetries = 3) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status === 429) { await new Promise(res => setTimeout(res, delay)); delay *= 2; continue; }
                    throw new Error(`HTTP ${response.status}`);
                } catch (err) { if (err.name === 'AbortError') throw err; if (i === maxRetries - 1) throw err; await new Promise(res => setTimeout(res, delay)); delay *= 2; }
            }
            throw new Error("API Limit Reached");
        }

        async function calculateTriplePerspectiveDecision(ticker) {
            try {
                // 병렬 페칭 (에러 처리)
                const [dRes, wRes] = await Promise.all([
                    fetchWithRetry(`/api/stock/${ticker}?interval=1d&range=2y`),
                    fetchWithRetry(`/api/stock/${ticker}?interval=1wk&range=max`)
                ]);
                const dD = (await dRes.json()).chart.result[0];
                const wD = (await wRes.json()).chart.result[0];
                
                const analyze = (data, weight) => {
                    if(!data || !data.indicators.quote[0].close) return { status:"LACK", maDist:"0.00", rsi:"50.0", macd:"0.000", stoch:"50.0", bbStr:"-" };
                    const c = data.indicators.quote[0].close.filter(v => v !== null);
                    if(c.length < 120) return { status:"LACK", maDist:"0.00", rsi:"50.0", macd:"0.000", stoch:"50.0", bbStr:"-" };
                    
                    const o = data.indicators.quote[0].open; const h = data.indicators.quote[0].high; const l = data.indicators.quote[0].low;
                    let kData = [];
                    for(let i=0; i<c.length; i++){ if(c[i]!==null && o[i]!==null) kData.push([o[i], c[i], l[i], h[i]]); else kData.push([0,0,0,0]); }
                    
                    const last = c.length - 1;
                    const rsi = Indicator.rsi(c, 14)[last] || 50;
                    const macd = Indicator.macd(c, 12, 26, 9).hist[last] || 0;
                    const sma = Indicator.sma(c, 120)[last] || c[last];
                    const stoch = Indicator.stochastic(kData, 14, 3).k[last] || 50;
                    const bb = Indicator.bollinger(c, 20, 2);
                    const dist = ((c[last] - sma) / sma) * 100;
                    
                    let buy = 0, sell = 0;
                    if (c[last] > sma) buy += weight.ma; else sell += weight.ma;
                    if (rsi < 35) buy += weight.rsi; else if (rsi > 65) sell += weight.rsi;
                    if (macd > 0) buy += weight.macd; else sell += weight.macd;
                    if (stoch < 20) buy += 0.5; else if (stoch > 80) sell += 0.5;
                    
                    let st = "HOLD"; if (buy > sell + 0.5) st = "BUY"; if (buy > sell + 1.5) st = "STRONG BUY"; if (sell > buy + 0.5) st = "BYE"; if (sell > buy + 1.5) st = "STRONG BYE";
                    
                    let bbStr = "밴드 내";
                    if(bb.upper[last] && c[last] > bb.upper[last]) bbStr = "상단 돌파(과열)";
                    if(bb.lower[last] && c[last] < bb.lower[last]) bbStr = "하단 이탈(침체)";

                    return { status: st, maDist: dist.toFixed(2), rsi: rsi.toFixed(1), macd: macd.toFixed(3), stoch: stoch.toFixed(1), bbStr: bbStr };
                };

                const st = analyze(dD, { ma: 0.5, rsi: 1.8, macd: 1.5 });
                const mt = analyze(dD, { ma: 1.5, rsi: 1.0, macd: 1.2 });
                const lt = analyze(wD, { ma: 3.0, rsi: 0.5, macd: 0.5 });
                
                analysisDetails = { 
                    short: {...st, summary: "RSI와 MACD의 단기 방향성을 추적한 결과입니다.", advice: "단기 변동성을 고려하여 목표가를 짧게 잡는 스윙/단기 매매가 유리합니다." }, 
                    mid: {...mt, summary: "중기 이평선과 볼린저밴드의 흐름을 파악한 결과입니다.", advice: "일봉과 주봉의 방향이 일치할 때 공격적인 진입을 고려하세요." }, 
                    long: {...lt, summary: "120일선의 지지력과 시장 사이클을 종합한 결과입니다.", advice: "장기 추세가 우상향이라면 단기 하락 노이즈는 훌륭한 매수 기회입니다." } 
                };
                
                const up = (id, r) => { 
                    const el = document.getElementById(id);
                    el.innerText = r.status; 
                    el.className = `text-lg font-black italic status-${r.status.replace(/ /g, '-')} uppercase`; 
                };
                up('st-signal-text', st); up('mt-signal-text', mt); up('lt-signal-text', lt);
                
                // 최상단 레포트 통계 갱신 (단기 기준)
                document.getElementById('val-ma-dist').innerText = `${st.maDist > 0 ? '+' : ''}${st.maDist}%`;
                document.getElementById('val-ma-dist').style.color = st.maDist > 0 ? '#26A69A' : '#EF5350';
                document.getElementById('val-rsi-main').innerText = st.rsi;
                document.getElementById('val-macd-main').innerText = st.macd;
                document.getElementById('val-bb-main').innerText = st.bbStr;
                document.getElementById('val-bb-main').style.color = st.bbStr.includes('과열') ? '#EF5350' : (st.bbStr.includes('침체') ? '#26A69A' : 'var(--text-main)');
                document.getElementById('val-stoch-main').innerText = st.stoch;
                document.getElementById('val-stoch-main').style.color = st.stoch > 80 ? '#EF5350' : (st.stoch < 20 ? '#26A69A' : 'var(--text-main)');
                
            } catch (e) { console.error("Error calculating multi-timeframe:", e); }
        }

        async function loadData(ticker, interval = currentInterval, range = currentRange) {
            if (abortController) abortController.abort();
            abortController = new AbortController();
            const signal = abortController.signal;
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const reqInterval = interval === '1y' ? '1mo' : interval;
                const cRes = await fetchWithRetry(`/api/stock/${ticker}?interval=${reqInterval}&range=${range}`, { signal });
                const cJson = await cRes.json();
                const d = cJson.chart.result[0];
                updateStatus("LIVE", "bg-emerald-500");
                globalChartData = d; globalTicker = ticker;
                
                calculateTriplePerspectiveDecision(ticker); // 병렬 처리
                renderDashboard(ticker, d);
            } catch (e) { 
                if (e.name !== 'AbortError') updateStatus("LIMIT", "bg-rose-500"); 
            } finally { 
                document.getElementById('loading-overlay').style.display = 'none'; 
            }
        }

        function updateStatus(t, c) { 
            document.getElementById('conn-label').innerText = t; 
            document.getElementById('status-dot').className = `w-2 h-2 rounded-full ${c}`; 
        }

        // 연봉 정확한 산출 (시가, 고가, 저가, 종가 합산)
        function aggregateToYearly(dates, kData, closes) {
            let yearly = {};
            dates.forEach((date, i) => {
                const year = date.split('-')[0];
                if (!yearly[year]) {
                    yearly[year] = { date: year, open: kData[i][0], close: kData[i][1], low: kData[i][2], high: kData[i][3] };
                } else {
                    yearly[year].close = kData[i][1]; 
                    yearly[year].high = Math.max(yearly[year].high, kData[i][3]); 
                    yearly[year].low = Math.min(yearly[year].low, kData[i][2]); 
                }
            });
            const sorted = Object.keys(yearly).sort();
            return { dates: sorted, kData: sorted.map(y => [yearly[y].open, yearly[y].close, yearly[y].low, yearly[y].high]), closes: sorted.map(y => yearly[y].close) };
        }

        function renderDashboard(ticker, data) {
            if(!myChart) return;
            const q = data.indicators.quote[0], ts = data.timestamp;
            if(!q || !ts) return;
            
            let dates = [], kData = [], closes = [];
            ts.forEach((t, i) => { if (q.close[i]) { dates.push(new Date(t * 1000).toISOString().split('T')[0]); kData.push([q.open[i], q.close[i], q.low[i], q.high[i]]); closes.push(q.close[i]); }});
            document.getElementById('display-ticker').innerText = ticker;
            const price = data.meta.regularMarketPrice || closes[closes.length - 1];
            document.getElementById('live-price').innerText = price?.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            // Interval에 따른 캔들 변환 (연봉 정확한 계산 적용)
            if (currentInterval === '1y') {
                const agg = aggregateToYearly(dates, kData, closes);
                dates = agg.dates; kData = agg.kData; closes = agg.closes;
            }

            const rsi = Indicator.rsi(closes, 14), ma120 = Indicator.sma(closes, 120), macd = Indicator.macd(closes, 12, 26, 9);
            const stoch = Indicator.stochastic(kData, 14, 3);
            const last = closes.length - 1;
            
            let reasoning = [];
            if(ma120[last]) {
                const maPct = (((closes[last] - ma120[last]) / ma120[last]) * 100).toFixed(2);
                reasoning.push({type: closes[last]>ma120[last]?'up':'down', t:'120일선 추세', d:`장기 추세선 대비 ${maPct}% 위치에 있습니다.`});
            }
            if(rsi[last] < 30) reasoning.push({type: 'up', t:'RSI (14) 수급', d:`RSI 지수가 ${rsi[last].toFixed(1)}로 심한 과매도 상태입니다.`});
            else if(rsi[last] > 70) reasoning.push({type: 'down', t:'RSI (14) 수급', d:`RSI 지수가 ${rsi[last].toFixed(1)}로 과매수 상태입니다.`});

            if(macd.hist[last] > 0) reasoning.push({type: 'up', t:'MACD 에너지', d:`양의 방향으로 상승 에너지를 발산 중입니다.`});
            else reasoning.push({type: 'down', t:'MACD 에너지', d:`음의 방향으로 하락 에너지가 강해집니다.`});
            
            if(stoch.k[last] < 20) reasoning.push({type: 'up', t:'스토캐스틱', d:`%K 값이 ${stoch.k[last].toFixed(1)}로 바닥권에 위치합니다.`});
            if(stoch.k[last] > 80) reasoning.push({type: 'down', t:'스토캐스틱', d:`%K 값이 ${stoch.k[last].toFixed(1)}로 천장권에 위치합니다.`});

            document.getElementById('reasoning-container').innerHTML = reasoning.map(i => `<div class="p-3 glass rounded-xl flex flex-col space-y-1.5 border border-themeBorder"><div class="flex items-center gap-2"><span class="signal-badge ${i.type==='up'?'signal-up':'signal-down'}">${i.type==='up'?'BUY':'SELL'}</span><p class="text-[0.65rem] font-black text-themeText uppercase">${i.t}</p></div><p class="text-[0.6rem] text-themeMuted pl-[3.2rem]">${i.d}</p></div>`).join('');
            
            // ECharts 테마 적용
            const styleColor = getComputedStyle(document.documentElement);
            const chartTextColor = styleColor.getPropertyValue('--text-muted').trim() || '#9CA3AF';
            const chartSplitColor = styleColor.getPropertyValue('--border-color').trim() || 'rgba(255,255,255,0.1)';
            const tooltipBg = styleColor.getPropertyValue('--modal-bg').trim() || '#151921';
            const tooltipText = styleColor.getPropertyValue('--text-main').trim() || '#E5E7EB';

            const maCols = { 10: '#FF3D71', 20: '#F97316', 50: '#A855F7', 60: '#3B82F6', 120: '#10B981', 200: '#EAB308' };
            let series = [{ name: 'Price', type: 'candlestick', data: kData, itemStyle: { color: '#26A69A', color0: '#EF5350', borderColor: '#26A69A', borderColor0: '#EF5350' }, z: 10 }];
            
            const widthNum = parseFloat(chartLineWidth);
            Object.keys(maSettings).forEach(p => { if (maSettings[p]) series.push({ name: `MA${p}`, type: 'line', data: Indicator.sma(closes, parseInt(p)), symbol: 'none', lineStyle: { color: maCols[p], width: widthNum, opacity: 0.8 }, z: 5 }); });
            
            series.push({ name: 'MACD', type: 'bar', xAxisIndex: 1, yAxisIndex: 1, data: macd.hist.map(v => ({ value: v, itemStyle: { color: v > 0 ? '#26A69A' : '#EF5350' } })) });

            myChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'cross', lineStyle: { color: chartTextColor, type: 'dashed' } }, 
                    backgroundColor: tooltipBg, borderColor: chartSplitColor, textStyle: { color: tooltipText, fontSize: 11 },
                    // 직전 캔들 대비 % 변동만 노출
                    formatter: (ps) => {
                        const idx = ps[0].dataIndex;
                        const curr = closes[idx];
                        const prev = idx > 0 ? closes[idx - 1] : null;
                        let r = `<div style="font-weight:900; margin-bottom:6px; border-bottom:1px solid ${chartSplitColor}; padding-bottom:4px;">${dates[idx]}</div>`;
                        if (prev !== null && curr !== null) {
                            const diff = curr - prev, pct = (diff / prev) * 100, color = diff >= 0 ? '#26A69A' : '#EF5350', sign = diff > 0 ? '+' : '';
                            r += `<div style="display:flex; justify-content:space-between; align-items:center; gap:16px;">
                                    <span style="color:${chartTextColor}; font-size:10px;">직전 캔들 대비 변동:</span>
                                    <b style="color:${color}; font-family:monospace; font-size:13px;">${sign}${pct.toFixed(2)}%</b>
                                  </div>`;
                        } else { r += `<span style="color:${chartTextColor};">데이터 없음</span>`; }
                        return r;
                    }
                },
                grid: [ { left: '2%', right: '2%', top: '5%', height: '55%', containLabel: true }, { left: '2%', right: '2%', top: '75%', height: '15%', containLabel: true } ],
                xAxis: [ { type: 'category', data: dates, axisLabel: { show: false } }, { type: 'category', gridIndex: 1, data: dates, axisLabel: { color: chartTextColor, fontSize: 10 } } ],
                yAxis: [ { scale: true, splitLine: { lineStyle: { color: chartSplitColor } }, axisLabel: { color: chartTextColor } }, { gridIndex: 1, splitLine: { show: false }, axisLabel: { show: false } } ],
                dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 70, end: 100 }],
                series: series
            }, true);
        }

        // 앱 초기화 구문 (안전)
        document.addEventListener("DOMContentLoaded", () => {
            try {
                myChart = echarts.init(document.getElementById('chart-main'));
                document.getElementById('search-form').onsubmit = (e) => { e.preventDefault(); const t = document.getElementById('ticker-input').value.trim().toUpperCase(); if(t) loadData(t); };
                
                setTheme(savedTheme);
                setFontSize(savedFontSize);
                updateMAButtons();
                
                setTimeout(() => { if(myChart) myChart.resize(); loadData('SPY'); }, 100);
                window.addEventListener('resize', () => { if(myChart) myChart.resize(); });
            } catch(e) { console.error("Initialization Error:", e); }
        });
    </script>
</body>
</html>
