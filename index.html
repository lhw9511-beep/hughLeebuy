<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUY or BYE | AI Precision Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        themeBg: 'var(--bg-color)', 
                        themePanel: 'var(--panel-color)', 
                        themeModal: 'var(--modal-bg)',
                        themeText: 'var(--text-main)',
                        themeMuted: 'var(--text-muted)',
                        themeBorder: 'var(--border-color)',
                        accent: '#3B82F6', 
                        up: '#26A69A', 
                        down: '#EF5350' 
                    } 
                } 
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root, .theme-default {
            --bg-color: #0B0E11;
            --panel-color: rgba(21, 25, 33, 0.8);
            --modal-bg: #151921;
            --text-main: #ffffff;
            --text-muted: #9CA3AF;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        .theme-light {
            --bg-color: #f3f4f6;
            --panel-color: rgba(255, 255, 255, 0.95);
            --modal-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-color: rgba(0, 0, 0, 0.15);
        }
        .theme-navy {
            --bg-color: #0f172a;
            --panel-color: rgba(30, 41, 59, 0.8);
            --modal-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        .theme-green {
            --bg-color: #022c22;
            --panel-color: rgba(6, 78, 59, 0.8);
            --modal-bg: #064e3b;
            --text-main: #ecfdf5;
            --text-muted: #34d399;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', 'Pretendard', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: var(--panel-color); backdrop-filter: blur(12px); border: 1px solid var(--border-color); }
        .chart-container { height: 400px; width: 100%; }
        @media (min-width: 1024px) { .chart-container { height: 500px; } }
        .portfolio-chart-container { height: 350px; width: 100%; }
        
        .chip-btn { padding: 0.3rem 0.6rem; font-size: 0.7rem; font-weight: 800; border-radius: 0.5rem; background: rgba(0,0,0,0.1); color: var(--text-muted); border: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s; }
        .chip-btn.active { background-color: #3B82F6; border-color: #3B82F6; color: white; }

        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { max-width: 500px; width: 100%; background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; max-height: 90vh; overflow-y: auto; }
        .modal-content-large { max-width: 900px; }

        .stat-box { background: rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color); border-radius: 12px; padding: 0.75rem 0.5rem; text-align: center; cursor: pointer; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; font-weight: 900; margin-top: 4px; }
        
        .main-tab-btn { padding: 0.6rem 1rem; font-weight: 900; font-size: 0.85rem; color: var(--text-muted); border-bottom: 2px solid transparent; cursor: pointer; }
        .main-tab-btn.active { color: var(--text-main); border-bottom-color: #3B82F6; }

        .pf-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 16px; padding: 1rem; cursor: pointer; display: flex; flex-direction: column; min-height: 120px; }
        .pf-card:hover { border-color: #3B82F6; transform: translateY(-3px); transition: all 0.2s; }
    </style>
</head>
<body>

    <!-- [HTML Structure] -->
    <header class="glass rounded-2xl m-2 md:m-4">
        <div class="flex justify-between items-center p-3 md:p-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="bg-accent p-1.5 rounded-lg shadow-md"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M23 6l-9.5 9.5-5-5L1 18"></path><path d="M17 6h6v6"></path></svg></div>
                <h1 class="text-xl md:text-2xl font-black italic text-themeText">BUY <span class="text-accent">or BYE</span></h1>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <button id="currency-toggle" onclick="toggleCurrency()" class="p-2 bg-black/20 border border-accent/40 rounded-xl text-themeText font-black text-sm w-20 shadow-inner">USD</button>
                <div class="hidden md:flex items-center">
                    <button onclick="switchMainTab('dashboard')" id="tab-btn-dashboard" class="main-tab-btn active">주식 분석</button>
                    <button onclick="switchMainTab('crypto')" id="tab-btn-crypto" class="main-tab-btn">크립토 분석</button>
                    <button onclick="switchMainTab('portfolio')" id="tab-btn-portfolio" class="main-tab-btn">포트폴리오</button>
                </div>
                <button onclick="openErrorModal()" id="btn-show-error" class="hidden p-2 bg-rose-500/20 rounded-xl text-rose-500 font-bold w-10">!</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto w-full p-2 md:p-4">
        <div id="view-dashboard" class="flex flex-col space-y-4">
            <form id="search-form" class="flex w-full"><input type="text" id="ticker-input" class="flex-grow bg-themePanel border border-themeBorder text-themeText rounded-l-xl px-4 py-3 uppercase outline-none focus:border-accent font-black shadow-inner" value="SPY"><button type="submit" class="bg-accent text-white px-6 rounded-r-xl font-black">분석</button></form>
            <div class="flex items-center gap-2 px-2"><span id="status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span><span id="conn-label" class="text-[0.65rem] font-bold text-themeMuted uppercase">WAITING</span></div>
            <div class="glass rounded-2xl p-5 flex flex-col shadow-xl relative min-h-[500px]">
                <div id="loading-overlay" class="absolute inset-0 bg-black/60 z-50 flex flex-col items-center justify-center rounded-2xl hidden"><div class="animate-spin rounded-full h-10 w-10 border-t-2 border-accent mb-3"></div><p class="text-xs font-black text-accent uppercase">Loading...</p></div>
                <div class="flex justify-between mb-4 border-b border-themeBorder pb-3">
                    <h2 id="display-ticker" class="text-3xl font-black text-themeText uppercase italic">---</h2>
                    <div id="live-price" class="text-2xl font-black text-themeText">---</div>
                </div>
                <div id="chart-main" class="chart-container flex-grow"></div>
            </div>
        </div>

        <div id="view-crypto" class="hidden flex-col space-y-4">
            <form id="crypto-search-form" class="flex w-full"><input type="text" id="crypto-ticker-input" class="flex-grow bg-themePanel border border-themeBorder text-themeText rounded-l-xl px-4 py-3 uppercase outline-none font-black shadow-inner" value="BTC-USD"><button type="submit" class="bg-accent text-white px-6 rounded-r-xl font-black">분석</button></form>
            <div id="crypto-chart-main" class="chart-container glass rounded-2xl p-5"></div>
        </div>

        <div id="view-portfolio" class="hidden flex-col space-y-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="pf-card" onclick="showPfDetail('6040')"><h3 class="font-black text-sm">60/40</h3><div class="mt-auto border-t border-themeBorder pt-2 text-[0.65rem] font-bold"><p>CAGR: <span id="card-cagr-6040">--</span></p><p>MDD: <span id="card-mdd-6040">--</span></p></div></div>
                <div class="pf-card" onclick="showPfDetail('baa')"><h3 class="font-black text-sm">BAA (Bold)</h3><div class="mt-auto border-t border-themeBorder pt-2 text-[0.65rem] font-bold"><p>CAGR: <span id="card-cagr-baa">--</span></p><p>MDD: <span id="card-mdd-baa">--</span></p></div></div>
            </div>
            <div class="glass p-5 rounded-2xl"><div id="chart-portfolio" class="portfolio-chart-container w-full"></div></div>
        </div>
    </main>

    <!-- 에러 모달 -->
    <div id="error-modal" class="modal-overlay" onclick="this.style.display='none'"><div class="modal-content"><h3 class="text-lg font-black text-rose-500 mb-4">Error Log</h3><textarea id="error-log-text" class="w-full h-40 bg-black/50 border border-rose-500/50 text-rose-400 text-[0.7rem] font-mono p-2 rounded-lg" readonly></textarea></div></div>

    <script>
        // ==========================================
        // 🚀 1. 전역 변수 및 상수 (Hoisting 방지)
        // ==========================================
        const API_BASE_URL = 'https://buy-or-bye.onrender.com';
        let errorLogs = [];
        let myChart = null, cryptoChart = null, pfChart = null;
        let globalChartData = null, globalTicker = "SPY", globalCryptoTicker = "BTC-USD";
        let currentInterval = '1d', currentRange = '1y';
        let currentCurrency = localStorage.getItem('dashboardCurrency') || 'USD';
        let fxCache = {};

        // ==========================================
        // 🚀 2. 필수 유틸리티 함수 (최상단 정의)
        // ==========================================
        function logError(msg, err) {
            console.error(msg, err);
            const time = new Date().toLocaleTimeString();
            errorLogs.unshift(`[${time}] ${msg}: ${err?.message || err}\n`);
            document.getElementById('btn-show-error')?.classList.remove('hidden');
            updateStatus("ERROR", "bg-rose-500");
        }

        function updateStatus(t, c) {
            const l = document.getElementById('conn-label'), d = document.getElementById('status-dot');
            if(l) { l.innerText = t; d.className = `w-2 h-2 rounded-full ${c}`; }
        }

        function setTheme(t) {
            try {
                document.documentElement.className = t;
                localStorage.setItem('dashboardTheme', t);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${t}`));
                if (globalChartData && myChart) renderDashboard(globalTicker, globalChartData);
            } catch(e) { console.warn("setTheme failed", e); }
        }

        async function fetchWithRetry(url, options = {}, maxRetries = 2) {
            for (let i = 0; i <= maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    await new Promise(res => setTimeout(res, 1000 * (i + 1)));
                } catch (err) {
                    if (i === maxRetries) throw err;
                }
            }
        }

        // ==========================================
        // 🚀 3. 데이터 및 퀀트 엔진
        // ==========================================
        const pfSimData = {
            years: ["2000","2002","2004","2006","2008","2010","2012","2014","2016","2018","2020","2022","2024", "2025", "2026"],
            'spy': [100, 88, 68, 87, 96, 100, 115, 121, 75, 93, 107, 109, 126, 166, 185],
            '6040': [100, 93, 82, 97, 104, 107, 118, 123, 90, 105, 116, 120, 131, 155, 168],
            'baa': [100, 110, 118, 122, 140, 155, 180, 195, 195, 230, 270, 285, 310, 370, 400]
        };
        const fxSimData = [1130, 1290, 1186, 1192, 1145, 1013, 929, 929, 1259, 1164, 1134, 1151, 1070, 1055, 1099, 1172, 1207];

        const getAdjustedSimData = (k) => {
            let d = pfSimData[k]; if (currentCurrency === 'USD') return d;
            let fx0 = fxSimData[0]; return d.map((v, i) => v * (fxSimData[i] / fx0));
        };

        function extractCleanData(data) {
            const q = data.indicators.quote[0], ts = data.timestamp;
            let dates = [], kData = [], closes = [];
            ts.forEach((t, i) => {
                if (q.close[i]) {
                    dates.push(new Date(t * 1000).toISOString().split('T')[0]);
                    kData.push([q.open[i], q.close[i], q.low[i], q.high[i]]);
                    closes.push(q.close[i]);
                }
            });
            return { dates, kData, closes };
        }

        // ==========================================
        // 🚀 4. 화면 렌더링 및 통신 로직
        // ==========================================
        async function loadData(ticker) {
            const loader = document.getElementById('loading-overlay');
            if(loader) loader.style.display = 'flex';
            try {
                const res = await fetchWithRetry(`${API_BASE_URL}/api/stock/${ticker}?interval=${currentInterval}&range=${currentRange}`);
                const json = await res.json();
                const d = json.chart.result[0];
                globalChartData = d; globalTicker = ticker;
                renderDashboard(ticker, d);
                updateStatus("LIVE", "bg-emerald-500");
            } catch(e) { logError("LoadData Failed", e); }
            finally { if(loader) loader.style.display = 'none'; }
        }

        function renderDashboard(ticker, data) {
            if(!myChart) return;
            const { dates, kData, closes } = extractCleanData(data);
            myChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: dates },
                yAxis: { scale: true },
                series: [{ name: 'Price', type: 'candlestick', data: kData, itemStyle: { color: '#26A69A', color0: '#EF5350' } }]
            }, true);
        }

        function toggleCurrency() {
            currentCurrency = currentCurrency === 'USD' ? 'KRW' : 'USD';
            localStorage.setItem('dashboardCurrency', currentCurrency);
            document.getElementById('currency-toggle').innerText = currentCurrency;
            loadData(globalTicker);
            renderPortfolioChart();
            updatePfCardMetrics();
        }

        function switchMainTab(t) {
            ['dashboard', 'crypto', 'portfolio'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                if(el) el.style.display = (v === t ? 'flex' : 'none');
                document.getElementById(`tab-btn-${v}`)?.classList.toggle('active', v === t);
            });
            if(t === 'portfolio') renderPortfolioChart();
        }

        function renderPortfolioChart() {
            if(!pfChart) return;
            const spy = getAdjustedSimData('spy'), baa = getAdjustedSimData('baa');
            pfChart.setOption({
                tooltip: {trigger:'axis'}, legend: {data:['SPY','BAA']},
                xAxis: {type:'category', data:pfSimData.years}, yAxis: {scale:true},
                series:[{name:'SPY', type:'line', data:spy}, {name:'BAA', type:'line', data:baa}]
            }, true);
        }

        function updatePfCardMetrics() {
            ['6040', 'baa'].forEach(k => {
                const cEl = document.getElementById(`card-cagr-${k}`);
                if(cEl) {
                    const d = getAdjustedSimData(k);
                    const cagr = (((d[d.length-1]/d[0])**(1/(d.length-1)))-1)*100;
                    cEl.innerText = cagr.toFixed(1) + '%';
                }
            });
        }

        // ==========================================
        // 🚀 5. 최종 시스템 초기화
        // ==========================================
        document.addEventListener("DOMContentLoaded", () => {
            window.scrollTo(0,0);
            try {
                myChart = echarts.init(document.getElementById('chart-main'));
                pfChart = echarts.init(document.getElementById('chart-portfolio'));
                
                // 전역 함수 호출 전 변수 선언 확인
                const savedTheme = localStorage.getItem('dashboardTheme') || 'theme-green';
                setTheme(savedTheme);
                
                document.getElementById('search-form').onsubmit = (e) => { e.preventDefault(); loadData(document.getElementById('ticker-input').value.toUpperCase()); };
                
                loadData('SPY');
                updatePfCardMetrics();
            } catch(e) { logError("Boot Error", e); }
        });

        // 기타 UI용 더미 함수들
        function openErrorModal() { document.getElementById('error-log-text').value = errorLogs.join(''); document.getElementById('error-modal').style.display='flex'; }
        function closeErrorModal() { document.getElementById('error-modal').style.display='none'; }
        function showPfDetail(k) { alert('Portfolio Detail: ' + k); }
        function closePfDetailModal() { document.getElementById('pf-detail-modal').style.display='none'; }
        function toggleProofs(v) { console.log("Toggle Proofs:", v); }
    </script>
</body>
</html>
