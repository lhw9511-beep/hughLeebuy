<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUY or BYE | AI Triple-Perspective Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { darkbg: '#0B0E11', panel: '#151921', accent: '#3B82F6', up: '#26A69A', down: '#EF5350' } 
                } 
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0B0E11; color: #E5E7EB; font-family: 'Inter', 'Pretendard', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(21, 25, 33, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .chart-container { height: 400px; width: 100%; }
        @media (min-width: 768px) { .chart-container { height: 600px; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 10px; }
        .ma-btn, .range-btn { transition: all 0.2s; font-size: 11px; font-weight: bold; border: 1px solid #374151; background: #0B0E11; color: #6B7280; padding: 6px 10px; }
        .ma-btn.active { background-color: #3B82F6; border-color: #3B82F6; color: white; }
        .range-btn.active { background-color: #6366F1; border-color: #6366F1; color: white; }
        #loading-overlay { display: none; position: absolute; inset: 0; background: rgba(11, 14, 17, 0.95); backdrop-filter: blur(15px); z-index: 50; align-items: center; justify-content: center; border-radius: 24px; }
        .signal-badge { font-weight: 900; font-size: 10px; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
        .signal-up { background-color: rgba(38, 166, 154, 0.2); color: #26A69A; }
        .signal-down { background-color: rgba(239, 83, 80, 0.2); color: #EF5350; }
        .perspective-col { cursor: pointer; transition: all 0.2s; border-radius: 12px; padding: 10px 4px; border: 1px solid transparent; }
        .perspective-col:active { background: rgba(255,255,255,0.05); }
        #detail-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { max-width: 550px; width: 92%; background: #151921; border: 1px solid #374151; border-radius: 20px; padding: 20px; }
        .stat-box { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 8px; }
        .stat-label { font-size: 8px; color: #6B7280; text-transform: uppercase; font-weight: 800; text-align: center; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; text-align: center; margin-top: 2px; }
        .decision-header { font-size: 9px; font-weight: 900; letter-spacing: 0.05em; color: #4B5563; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; margin-bottom: 6px; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-3 md:p-6 lg:p-8">

    <!-- Detail Modal -->
    <div id="detail-modal" onclick="closeModal()">
        <div class="modal-content shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-5">
                <div>
                    <h3 id="modal-title" class="text-xl font-black text-white uppercase italic">Analysis</h3>
                    <p id="modal-period" class="text-[10px] text-accent font-bold tracking-widest uppercase mt-1">---</p>
                </div>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white p-1"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="space-y-5 text-[13px] text-gray-300 leading-relaxed"></div>
            <div class="mt-6 pt-4 border-t border-gray-800">
                <button onclick="closeModal()" class="w-full bg-accent text-white py-3 rounded-xl text-sm font-black shadow-lg">확인 완료</button>
            </div>
        </div>
    </div>

    <div class="max-w-[1400px] mx-auto w-full flex-grow flex flex-col space-y-4 md:space-y-6">
        <!-- Header -->
        <header class="flex flex-col space-y-4 md:flex-row md:space-y-0 justify-between items-center glass p-5 md:p-6 rounded-2xl md:rounded-3xl border border-white/5">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
                <div class="p-2 bg-accent rounded-xl shadow-lg shadow-accent/20"><i data-lucide="trending-up" class="text-white w-5 h-5 md:w-6 md:h-6"></i></div>
                <h1 class="text-xl md:text-2xl font-black tracking-tighter uppercase italic text-white leading-none">BUY <span class="text-accent">or BYE</span></h1>
            </div>
            
            <div class="flex flex-col items-center md:items-end space-y-2 w-full md:w-auto">
                <form id="search-form" class="flex w-full md:w-auto">
                    <input type="text" id="ticker-input" class="flex-grow bg-gray-900 border border-gray-700 text-white rounded-l-xl px-4 py-2.5 text-sm uppercase outline-none focus:ring-1 focus:ring-accent" value="SPY">
                    <button type="submit" class="bg-accent px-5 py-2.5 rounded-r-xl font-black text-sm hover:bg-blue-600 transition text-white">분석</button>
                </form>
                <div id="status-text" class="text-[9px] font-bold flex items-center">
                    <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-600 mr-2"></span>
                    <span id="conn-label" class="text-gray-500 uppercase tracking-widest">READY</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-6 flex-grow">
            <!-- Left: Chart & Main Info -->
            <div class="lg:col-span-3 space-y-4 md:space-y-6">
                <div class="glass rounded-2xl md:rounded-3xl p-4 md:p-6 relative overflow-hidden shadow-xl border border-white/5">
                    <div id="loading-overlay">
                        <div class="flex flex-col items-center">
                            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-accent mb-4"></div>
                            <p class="text-[10px] font-bold text-accent uppercase tracking-widest">Syncing Market Data...</p>
                        </div>
                    </div>
                    
                    <div class="flex flex-col space-y-6 mb-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="flex items-center space-x-2">
                                    <h2 id="display-ticker" class="text-4xl md:text-6xl font-black text-white uppercase tracking-tighter leading-none">---</h2>
                                    <span id="asset-type-badge" class="px-2 py-0.5 rounded text-[8px] border border-gray-700 font-bold uppercase text-gray-500">Wait</span>
                                </div>
                                <div id="live-price" class="text-3xl md:text-5xl font-mono font-black text-white mt-2">---</div>
                            </div>
                            
                            <div class="flex flex-col items-end space-y-3">
                                <div id="range-toggles" class="flex flex-wrap justify-end gap-1">
                                    <button onclick="changeInterval('1d', '1y', 'D')" id="range-D" class="range-btn rounded-lg active">일</button>
                                    <button onclick="changeInterval('1wk', '2y', 'W')" id="range-W" class="range-btn rounded-lg">주</button>
                                    <button onclick="changeInterval('1mo', '5y', 'M')" id="range-M" class="range-btn rounded-lg">월</button>
                                    <button onclick="changeInterval('1y', 'max', 'Y')" id="range-Y" class="range-btn rounded-lg">연</button>
                                </div>
                                <div id="ma-toggles" class="flex gap-1">
                                    <button onclick="toggleMA(20)" id="btn-ma-20" class="ma-btn rounded-lg">MA20</button>
                                    <button onclick="toggleMA(120)" id="btn-ma-120" class="ma-btn rounded-lg active">MA120</button>
                                </div>
                            </div>
                        </div>
                        <p id="ticker-desc-line" class="text-[11px] md:text-xs text-gray-400 font-medium border-l-2 border-accent pl-3 leading-relaxed">분석 데이터를 불러오고 있습니다.</p>
                    </div>
                    
                    <div id="chart-main" class="chart-container"></div>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="flex flex-col space-y-4 md:space-y-6">
                <!-- Master Intelligence Card -->
                <div class="glass rounded-2xl md:rounded-3xl p-5 md:p-6 border-t-4 md:border-t-8 border-gray-700 shadow-xl border-x border-b border-white/5" id="master-decision-panel">
                    <div class="flex justify-between items-center mb-5">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="shield-check" class="w-4 h-4 text-accent"></i>
                            <p class="text-gray-500 text-[9px] font-black uppercase tracking-wider">AI Master Signal</p>
                        </div>
                        <span id="master-status-badge" class="text-[8px] font-black px-1.5 py-0.5 rounded bg-gray-800 text-gray-400 uppercase">Wait</span>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-1 md:gap-2 mb-6">
                        <div class="perspective-col text-center border-r border-gray-800" onclick="showDetail('short')">
                            <p class="decision-header">SHORT</p>
                            <div id="st-signal-text" class="text-xs md:text-sm font-black italic text-gray-600">WAIT</div>
                        </div>
                        <div class="perspective-col text-center border-r border-gray-800" onclick="showDetail('mid')">
                            <p class="decision-header">MID</p>
                            <div id="mt-signal-text" class="text-xs md:text-sm font-black italic text-gray-600">WAIT</div>
                        </div>
                        <div class="perspective-col text-center" onclick="showDetail('long')">
                            <p class="decision-header">LONG</p>
                            <div id="lt-signal-text" class="text-xs md:text-sm font-black italic text-gray-600">WAIT</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 border-t border-gray-800 pt-4">
                        <div class="stat-box"><p class="stat-label">120MA%</p><p id="val-ma-dist" class="stat-value">---</p></div>
                        <div class="stat-box"><p class="stat-label">RSI</p><p id="val-rsi-main" class="stat-value">---</p></div>
                        <div class="stat-box"><p class="stat-label">MACD</p><p id="val-macd-main" class="stat-value">---</p></div>
                    </div>
                </div>

                <!-- Analysis Report List -->
                <div class="glass rounded-2xl md:rounded-3xl p-5 md:p-6 flex-grow flex flex-col shadow-lg overflow-hidden min-h-[300px] border border-white/5">
                    <h4 class="font-black text-white uppercase text-[10px] border-b border-gray-800 pb-3 mb-4 tracking-widest flex items-center">
                        <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2 text-emerald-500"></i> 분석 리포트
                    </h4>
                    <div id="reasoning-container" class="space-y-3 overflow-y-auto pr-1 custom-scroll flex-grow">
                        <p class="text-[10px] text-gray-500 text-center py-10 italic">입력한 종목의 시장 관점을 분석 중입니다...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const myChart = echarts.init(document.getElementById('chart-main'));
        const API_BASE_URL = window.location.origin;

        let maSettings = { 20: false, 120: true };
        let currentInterval = '1d';
        let currentRange = '1y';
        let globalChartData = null;
        let globalTicker = "SPY";
        let abortController = null;
        let analysisDetails = { short: {}, mid: {}, long: {} };

        async function fetchWithRetry(url, options = {}, maxRetries = 3) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status === 429) { await new Promise(res => setTimeout(res, delay)); delay *= 2; continue; }
                    throw new Error(`HTTP ${response.status}`);
                } catch (err) { if (err.name === 'AbortError') throw err; if (i === maxRetries - 1) throw err; await new Promise(res => setTimeout(res, delay)); delay *= 2; }
            }
        }

        const Indicator = {
            sma: (d, p) => d.map((_, i) => { if (i < p - 1) return null; const slice = d.slice(i - p + 1, i + 1).filter(v => v !== null); return slice.length === p ? slice.reduce((a, b) => a + b) / p : null; }),
            ema: (d, p) => { let r = Array(d.length).fill(null), k = 2 / (p + 1); let s = d.findIndex(v => v !== null); if (s === -1) return r; let e = d[s]; r[s] = e; for (let i = s + 1; i < d.length; i++) { if (d[i] !== null) { e = (d[i] * k) + (e * (1 - k)); r[i] = e; } } return r; },
            macd: (d, s, l, sig) => { const se = Indicator.ema(d, s), le = Indicator.ema(d, l); const line = se.map((v, i) => (v === null || le[i] === null) ? null : v - le[i]); const signal = Indicator.ema(line, sig); return { line, signal, hist: line.map((v, i) => (v === null || signal[i] === null) ? null : v - signal[i]) }; },
            rsi: (d, p) => { let r = Array(d.length).fill(null), g = 0, l = 0; for (let i = 1; i < d.length; i++) { let diff = d[i] - d[i - 1]; let cg = diff > 0 ? diff : 0, cl = diff < 0 ? -diff : 0; g = ((g * (p - 1)) + cg) / p; l = ((l * (p - 1)) + cl) / p; if (i >= p) r[i] = (l === 0) ? 100 : 100 - (100 / (1 + g / l)); } return r; }
        };

        function toggleMA(p) { maSettings[p] = !maSettings[p]; updateMAButtons(); if (globalChartData) renderDashboard(globalTicker, globalChartData); }
        function updateMAButtons() { Object.keys(maSettings).forEach(p => { const b = document.getElementById(`btn-ma-${p}`); if (maSettings[p]) b.classList.add('active'); else b.classList.remove('active'); }); }
        function changeInterval(i, r, l) { currentInterval = i; currentRange = r; document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active')); document.getElementById(`range-${l}`).classList.add('active'); loadData(globalTicker, i, r); }

        function showDetail(p) {
            const m = document.getElementById('detail-modal');
            const d = analysisDetails[p];
            if (!d.status) return;
            m.style.display = 'flex';
            document.getElementById('modal-title').innerText = `${p.toUpperCase()} VIEW`;
            document.getElementById('modal-period').innerText = p==='short'?'1-20일(단기 모멘텀)':(p==='mid'?'20-60일(중기 추세)':'60일 이상(장기 가치)');
            document.getElementById('modal-body').innerHTML = `<div class="bg-white/5 p-5 rounded-2xl text-center border border-white/5"><span class="text-4xl font-black italic ${d.status.includes('BUY')?'text-up':'text-down'}">${d.status}</span><p class="text-xs text-gray-400 mt-3 leading-relaxed">${d.summary}</p></div><div class="grid grid-cols-1 gap-3"><div class="stat-box flex justify-between items-center py-3 px-4"><span>120일선 이격도</span><b class="${parseFloat(d.maDist)>0?'text-up':'text-down'} font-mono">${d.maDist}%</b></div><div class="stat-box flex justify-between items-center py-3 px-4"><span>RSI 지수</span><b class="text-white font-mono">${d.rsi}</b></div><div class="stat-box flex justify-between items-center py-3 px-4"><span>MACD 히스토그램</span><b class="${parseFloat(d.macd)>0?'text-up':'text-down'} font-mono">${d.macd}</b></div></div>`;
            lucide.createIcons();
        }
        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        async function calculateTriplePerspectiveDecision(ticker) {
            const b = document.getElementById('master-status-badge');
            b.innerText = "Syncing";
            try {
                const [dRes, wRes] = await Promise.all([
                    fetchWithRetry(`${API_BASE_URL}/api/stock/${ticker}?interval=1d&range=1y`),
                    fetchWithRetry(`${API_BASE_URL}/api/stock/${ticker}?interval=1wk&range=max`)
                ]);
                const dD = (await dRes.json()).chart.result[0];
                const wD = (await wRes.json()).chart.result[0];
                const analyze = (data, weight) => {
                    const c = data.indicators.quote[0].close.filter(v => v !== null);
                    const last = c.length - 1;
                    const rsi = Indicator.rsi(c, 14)[last] || 50;
                    const macd = Indicator.macd(c, 12, 26, 9).hist[last] || 0;
                    const sma = Indicator.sma(c, 120)[last] || c[last];
                    const dist = ((c[last] - sma) / sma) * 100;
                    let buy = 0, sell = 0;
                    if (c[last] > sma) buy += weight.ma; else sell += weight.ma;
                    if (rsi < 35) buy += weight.rsi; else if (rsi > 65) sell += weight.rsi;
                    if (macd > 0) buy += weight.macd; else sell += weight.macd;
                    let st = "HOLD"; if (buy > sell + 0.5) st = "BUY"; if (buy > sell + 1.2) st = "STRONG BUY"; if (sell > buy + 0.5) st = "BYE"; if (sell > buy + 1.3) st = "STRONG BYE";
                    return { status: st, maDist: dist.toFixed(2), rsi: rsi.toFixed(1), macd: macd.toFixed(3) };
                };
                const st = analyze(dD, { ma: 0.6, rsi: 1.8, macd: 1.6 });
                const mt = analyze(dD, { ma: 1.4, rsi: 1.0, macd: 1.6 });
                const lt = analyze(wD, { ma: 3.0, rsi: 0.5, macd: 0.5 });
                analysisDetails = { 
                    short: {...st, summary: "RSI와 MACD의 골든크로스 및 과매도 반등 에너지를 포착했습니다."}, 
                    mid: {...mt, summary: "20일 및 60일 이평선의 정배열 상태와 추세 지속력을 분석했습니다."}, 
                    long: {...lt, summary: "주봉 기준 120일선 지지 여부와 거시적 상승 파동을 분석했습니다."} 
                };
                const up = (id, r) => { document.getElementById(id).innerText = r.status; document.getElementById(id).className = `text-xs md:text-sm font-black italic ${r.status.includes('BUY')?'text-up':'text-down'}`; };
                up('st-signal-text', st); up('mt-signal-text', mt); up('lt-signal-text', lt);
                document.getElementById('val-ma-dist').innerText = `${st.maDist}%`;
                document.getElementById('val-ma-dist').style.color = parseFloat(st.maDist)>0?'#26A69A':'#EF5350';
                document.getElementById('val-rsi-main').innerText = st.rsi;
                document.getElementById('val-macd-main').innerText = st.macd;
                b.innerText = "Synced"; b.className = "text-[8px] font-black px-1.5 py-0.5 rounded bg-emerald-500/10 text-emerald-500 uppercase";
            } catch (e) { b.innerText = "Error"; }
        }

        async function loadData(ticker, interval = currentInterval, range = currentRange) {
            if (abortController) abortController.abort();
            abortController = new AbortController();
            const signal = abortController.signal;
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const reqInterval = interval === '1y' ? '1mo' : interval;
                const cRes = await fetchWithRetry(`${API_BASE_URL}/api/stock/${ticker}?interval=${reqInterval}&range=${range}`, { signal });
                const cJson = await cRes.json();
                const d = cJson.chart.result[0];
                updateStatus("LIVE", "bg-emerald-500");
                globalChartData = d; globalTicker = ticker;
                calculateTriplePerspectiveDecision(ticker);
                fetch(`${API_BASE_URL}/api/fundamentals/${ticker}`).then(r => r.json()).then(f => renderInfo(ticker, f.quoteSummary.result[0]));
                renderDashboard(ticker, d);
            } catch (e) { if (e.name !== 'AbortError') updateStatus("LIMIT", "bg-rose-500"); } finally { document.getElementById('loading-overlay').style.display = 'none'; }
        }

        function updateStatus(t, c) { document.getElementById('conn-label').innerText = t; document.getElementById('status-dot').className = `w-1.5 h-1.5 rounded-full ${c} mr-2`; }

        function renderInfo(ticker, data) {
            const desc = document.getElementById('ticker-desc-line');
            const badge = document.getElementById('asset-type-badge');
            if (!data || data.error) { desc.innerText = "데이터 API 제한 모드입니다."; badge.innerText = "ASSET"; return; }
            const sum = data.summaryProfile?.longBusinessSummary || data.fundProfile?.longBusinessSummary || "설명이 존재하지 않습니다.";
            desc.innerText = sum.split('.')[0] + ".";
            badge.innerText = (data.defaultKeyStatistics?.quoteType === 'ETF' || ticker === 'SPY' || ticker === 'QQQ') ? "ETF" : "Stock";
            badge.className = "px-2 py-0.5 rounded text-[8px] border border-accent/30 font-bold uppercase text-accent";
        }

        function renderDashboard(ticker, data) {
            const q = data.indicators.quote[0], ts = data.timestamp;
            let dates = [], kData = [], closes = [];
            ts.forEach((t, i) => { if (q.close[i]) { 
                dates.push(new Date(t * 1000).toISOString().split('T')[0]); 
                kData.push([q.open[i], q.close[i], q.low[i], q.high[i]]); 
                closes.push(q.close[i]); 
            }});
            document.getElementById('display-ticker').innerText = ticker;
            const price = data.meta.regularMarketPrice || closes[closes.length - 1];
            document.getElementById('live-price').innerText = price?.toLocaleString(undefined, {minimumFractionDigits: 2});
            const last = closes.length - 1;
            const ma120 = Indicator.sma(closes, 120);
            let reasoning = [];
            if(ma120[last]) {
                const maPct = (((closes[last] - ma120[last]) / ma120[last]) * 100).toFixed(2);
                reasoning.push({type: closes[last]>ma120[last]?'up':'down', t:'120일 추세선 분석', d:`장기 추세 대비 ${maPct}% 위치에 있습니다.`});
            }
            document.getElementById('reasoning-container').innerHTML = reasoning.map(i => `<div class="p-4 glass rounded-xl flex flex-col space-y-2 border border-white/5"><div class="flex items-center space-x-3"><span class="signal-badge ${i.type==='up'?'signal-up':'signal-down'}">${i.type==='up'?'BUY':'BYE'}</span><p class="text-[11px] font-black text-white uppercase">${i.t}</p></div><p class="text-[10px] text-gray-400 pl-12 leading-relaxed">${i.d}</p></div>`).join('');
            lucide.createIcons();
            const maCols = { 20: '#F97316', 120: '#10B981' };
            let series = [{ name: 'Price', type: 'candlestick', data: kData, itemStyle: { color: '#26A69A', color0: '#EF5350', borderColor: '#26A69A', borderColor0: '#EF5350' } }];
            Object.keys(maSettings).forEach(p => { if (maSettings[p]) series.push({ name: `MA${p}`, type: 'line', data: Indicator.sma(closes, parseInt(p)), symbol: 'none', lineStyle: { color: maCols[p], width: 1.5, opacity: 0.8 } }); });
            myChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, backgroundColor: '#151921', borderColor: '#374151', textStyle: { color: '#E5E7EB', fontSize: 10 } },
                grid: { left: '40', right: '10', top: '30', bottom: '15%' },
                xAxis: { type: 'category', data: dates, axisLabel: { color: '#6B7280', fontSize: 9 } },
                yAxis: { scale: true, position: 'right', splitLine: { lineStyle: { color: '#1F2937' } }, axisLabel: { fontSize: 9 } },
                dataZoom: [{ type: 'inside', start: 85, end: 100 }],
                series: series
            }, true);
        }

        document.getElementById('search-form').onsubmit = (e) => { e.preventDefault(); const t = document.getElementById('ticker-input').value.trim().toUpperCase(); if(t) loadData(t); };
        loadData('SPY'); 
        window.onresize = () => { myChart.resize(); };
    </script>
</body>
</html>
