        function formatPriceStr(price) {
            if (price === null || price === undefined || isNaN(price)) return '--';

        function extractCleanData(data) {
            if(!data || !data.indicators || !data.indicators.quote || !data.indicators.quote[0]) return { dates:[], kData:[], closes:[] };
            const q = data.indicators.quote[0]; const ts = data.timestamp || [];
            let dates = [], kData = [], closes = []; let lastValidClose = 0;
            const livePrice = data.meta?.regularMarketPrice;
            
            for(let i = 0; i < ts.length; i++) {
                let o = q.open[i]; let h = q.high[i]; let l = q.low[i]; let c = q.close[i];
                if (c === null || c === undefined) c = lastValidClose; else lastValidClose = c;
                if (o === null || o === undefined) o = c;
                if (h === null || h === undefined) h = c;
                if (l === null || l === undefined) l = c;
                if (i === ts.length - 1 && livePrice) { c = livePrice; if (h < c) h = c; if (l > c) l = c; }
                if (c !== 0 && c !== null) {
                    let d = new Date(ts[i] * 1000);
                    let dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                    dates.push(dateStr); kData.push([o, c, l, h]); closes.push(c);
                }
            }
            return { dates, kData, closes };
        }

        function calcMDDArray(arr) {
            let mdd = [], peak = arr[0];
            for(let i=0; i<arr.length; i++) {
                if(arr[i] > peak) peak = arr[i];
                mdd.push(parseFloat(((arr[i] - peak) / peak * 100).toFixed(2)));
            }
            return mdd;
        }

        function calcVolatility(closes) {
            if(closes.length < 30) return 0;
            const recent = closes.slice(-30); let returns = [];
            for(let i=1; i<recent.length; i++) returns.push((recent[i] - recent[i-1]) / recent[i-1]);
            const mean = returns.reduce((a,b)=>a+b, 0) / returns.length;
            const variance = returns.reduce((a,b)=>a + Math.pow(b-mean, 2), 0) / returns.length;
            return Math.sqrt(variance) * Math.sqrt(365) * 100;
        }

        const Indicator = {
            sma: function(d, p) { return d.map((_, i) => { if (i < p - 1) return null; const s = d.slice(i - p + 1, i + 1).filter(v => v !== null); return s.length === p ? s.reduce((a, b) => a + b) / p : null; }); },
            ema: function(d, p) { let r=Array(d.length).fill(null), k=2/(p+1), s=d.findIndex(v=>v!==null); if(s===-1)return r; r[s]=d[s]; for(let i=s+1;i<d.length;i++) r[i]=d[i]*k+r[i-1]*(1-k); return r; },
            macd: function(d, s, l, sig) { const se=this.ema(d,s), le=this.ema(d,l); const line=se.map((v,i)=>v===null||le[i]===null?null:v-le[i]); const signal = this.ema(line,sig); return { hist: line.map((v,i)=>v===null||signal[i]===null?null:v-signal[i]) }; },
            rsi: function(d, p) { let r=Array(d.length).fill(null), g=0, l=0; for(let i=1;i<d.length;i++){ let df=d[i]-d[i-1], cg=df>0?df:0, cl=df<0?-df:0; g=(g*(p-1)+cg)/p; l=(l*(p-1)+cl)/p; if(i>=p)r[i]=100-(100/(1+g/l)); } return r; },
            bollinger: function(d, p, m) { const sma=this.sma(d,p), up=Array(d.length).fill(null), low=Array(d.length).fill(null); for(let i=p-1;i<d.length;i++){ if(sma[i]===null)continue; const sl=d.slice(i-p+1,i+1); const v=sl.reduce((a,val)=>a+Math.pow(val-sma[i],2),0)/p; const sd=Math.sqrt(v); up[i]=sma[i]+(m*sd); low[i]=sma[i]-(m*sd); } return { upper: up, lower: low }; },
            stochastic: function(k, p, s) { let r=Array(k.length).fill(null); for(let i=p-1;i<k.length;i++){ const sl=k.slice(i-p+1,i+1); const h=Math.max(...sl.map(d=>d[3])), l=Math.min(...sl.map(d=>d[2])); r[i]=(h!==l)?((k[i][1]-l)/(h-l))*100:50; } return { k: r, d: this.sma(r, s) }; }
        };

        async function fetchStockData(ticker, intv = '1d', range = '1y', isCrypto = false) {
            let t = ticker.toUpperCase().trim();
            if (isCrypto && !t.includes('-')) t += '-USD';

            const timestamp = Date.now();
            const backendUrl = `/api/stock/${encodeURIComponent(t)}?interval=${intv}&range=${range}&_t=${timestamp}`;
            const rawUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(t)}?interval=${intv}&range=${range}&includePrePost=false&_t=${timestamp}`;
            const rawUrl2 = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(t)}?interval=${intv}&range=${range}&includePrePost=false&_t=${timestamp}`;
            
            const servers = [
                { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(rawUrl2)}`, name: 'AllOrigins 프록시' },
                { url: backendUrl, name: '자체 백엔드 API' },
                { url: `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(rawUrl)}`, name: 'CodeTabs 프록시' }
            ];

            let lastError = "";

            for (const server of servers) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 20000); 
                    const res = await fetch(server.url, { cache: 'no-store', signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const text = await res.text();
                    if (!text || text.trim() === '') throw new Error("빈 응답");
                    if (text.trim().startsWith('<')) throw new Error("보안 차단 페이지");

                    let data = JSON.parse(text);
                    if (data.error && typeof data.error === 'string') throw new Error(data.error);
                    if (data.chart && data.chart.error) throw new Error(data.chart.error.code);
                    if (!data.chart || !data.chart.result || !data.chart.result[0]) throw new Error("차트 데이터 없음");
                    return data.chart.result[0];

                } catch (err) {
                    lastError = err.message || String(err);
                    if (err.name === 'AbortError' || lastError.toLowerCase().includes('timeout')) { lastError = "Timeout"; }
                }
            }
            throw new Error(`서버 연결 실패: ${lastError}`);
        }

        function getIndicatorStatus(type, val, marketType = 'stock', timeHorizon = 'short') {
            let sig = 'NEUTRAL', text = '중립', color = 'var(--text-muted)';
            const weight = WEIGHT_MATRIX[marketType]?.[timeHorizon]?.[type] || 0;
            if (isNaN(val) || val === null || val === undefined) return { sig, text, color, weight: 0 };

            if (type === 'VIX') {
                if (val >= 25) { sig = 'BUY'; text = '공포 (매수)'; color = 'var(--up)'; } else if (val <= 15) { sig = 'SELL'; text = '탐욕 (매도)'; color = 'var(--down)'; }
            } else if (type === 'FNG') {
                if (val <= 45) { sig = 'BUY'; text = '공포 (매수)'; color = 'var(--up)'; } else if (val >= 55) { sig = 'SELL'; text = '탐욕 (매도)'; color = 'var(--down)'; }
            } else if (type === 'VOL') {
                if (val < 40) { sig = 'BUY'; text = '안정 (매수)'; color = 'var(--up)'; } else if (val > 80) { sig = 'SELL'; text = '위험 (매도)'; color = 'var(--down)'; }
            } else if (type === 'DIST') {
                if (val > 0) { sig = 'BUY'; text = '상승 (매수)'; color = 'var(--up)'; } else if (val < 0) { sig = 'SELL'; text = '하락 (매도)'; color = 'var(--down)'; }
            } else if (type === 'RSI') {
                if (val < 40) { sig = 'BUY'; text = '과매도 (매수)'; color = 'var(--up)'; } else if (val > 60) { sig = 'SELL'; text = '과매수 (매도)'; color = 'var(--down)'; }
            } else if (type === 'MACD') {
                if (val > 0) { sig = 'BUY'; text = '상승 (매수)'; color = 'var(--up)'; } else if (val < 0) { sig = 'SELL'; text = '하락 (매도)'; color = 'var(--down)'; }
            } else if (type === 'BB') {
                if (val === 'LOWER') { sig = 'BUY'; text = '하단 지지 (매수)'; color = 'var(--up)'; } else if (val === 'UPPER') { sig = 'SELL'; text = '상단 저항 (매도)'; color = 'var(--down)'; }
            } else if (type === 'STOCH') {
                if (val < 20) { sig = 'BUY'; text = '바닥 (매수)'; color = 'var(--up)'; } else if (val > 80) { sig = 'SELL'; text = '과열 (매도)'; color = 'var(--down)'; }
            }
            return { sig, text, color, weight };
        }

        async function calculateTriplePerspectiveDecision(ticker, marketType = 'stock') {
            try {
                const dData = await fetchStockData(ticker, '1d', '2y', marketType === 'crypto');
                await delay(300);
                const wData = await fetchStockData(ticker, '1wk', '5y', marketType === 'crypto');
                await delay(300);
                const mData = await fetchStockData(ticker, '1mo', '10y', marketType === 'crypto');

                const analyze = (data, timeHorizon, periods) => {
                    let { kData, closes } = extractCleanData(data);
                    if(closes.length < periods.ma) return { status:"WAIT", buyScore:0, sellScore:0, diff:0, pct: 50, maxScore: 50, breakdown: [] };
                    
                    const last = closes.length - 1;
                    const rsiArr = Indicator.rsi(closes, periods.rsi); const rsi = rsiArr[last] || 50;
                    const macdArr = Indicator.macd(closes, 12, 26, 9).hist; const macd = macdArr[last] || 0;
                    const smaArr = Indicator.sma(closes, periods.ma); const sma = smaArr[last] || closes[last];
                    const stochArr = Indicator.stochastic(kData, periods.stoch, 3).k; const stoch = stochArr[last] || 50;
                    const bb = Indicator.bollinger(closes, 20, 2);
                    const dist = ((closes[last] - sma) / sma) * 100;
                    
                    let bbStr = "MID";
                    if(bb.upper[last] !== null && closes[last] >= bb.upper[last] * 0.98) bbStr = "UPPER";
                    else if(bb.lower[last] !== null && closes[last] <= bb.lower[last] * 1.02) bbStr = "LOWER";

                    const weights = WEIGHT_MATRIX[marketType][timeHorizon];
                    const maxScore = Object.values(weights).reduce((a, b) => a + b, 0); 
                    
                    const macroVal = marketType === 'stock' ? (globalVix || 20) : calcVolatility(closes);
                    const fngVal = marketType === 'stock' ? (globalFng || 50) : (globalCryptoFng || 50);

                    const sigs = {
                        dist: getIndicatorStatus('DIST', dist, marketType, timeHorizon),
                        rsi: getIndicatorStatus('RSI', rsi, marketType, timeHorizon),
                        macd: getIndicatorStatus('MACD', macd, marketType, timeHorizon),
                        stoch: getIndicatorStatus('STOCH', stoch, marketType, timeHorizon),
                        bb: getIndicatorStatus('BB', bbStr, marketType, timeHorizon),
                        macro: getIndicatorStatus(marketType === 'stock' ? 'VIX' : 'VOL', macroVal, marketType, timeHorizon),
                        fng: getIndicatorStatus('FNG', fngVal, marketType, timeHorizon)
                    };

                    sigs.dist.raw = dist; sigs.rsi.raw = rsi; sigs.macd.raw = macd; sigs.stoch.raw = stoch; sigs.bb.raw = bbStr;
                    sigs.macro.raw = macroVal; sigs.fng.raw = fngVal;

                    let buyScore = 0, sellScore = 0, breakdown = [];
                    const addScore = (name, s) => {
                        let valStr = "0.0";
                        if (s.sig === 'BUY') { buyScore += s.weight; valStr = `+${s.weight.toFixed(1)}`; }
                        else if (s.sig === 'SELL') { sellScore += s.weight; valStr = `-${s.weight.toFixed(1)}`; }
                        breakdown.push({name, sig: s.sig, val: valStr, weight: s.weight, raw: s.raw, text: s.text});
                    };

                    addScore(marketType === 'stock' ? 'VIX' : 'VOL', sigs.macro);
                    addScore('FNG', sigs.fng); addScore('DIST', sigs.dist); addScore('RSI', sigs.rsi); addScore('MACD', sigs.macd); addScore('STOCH', sigs.stoch); addScore('BB', sigs.bb);

                    const diff = buyScore - sellScore;
                    let st = "HOLD"; 
                    if (diff >= 15) st = "STRONG BUY"; else if (diff > 5) st = "BUY"; else if (diff <= -15) st = "STRONG BYE"; else if (diff < -5) st = "BYE";
                    const pct = Math.max(0, Math.min(100, 50 + (diff / maxScore) * 50));
                    return { status: st, buyScore, sellScore, diff, pct, maxScore, breakdown };
                };

                const stRes = analyze(dData, 'short', { ma: 120, rsi: 14, stoch: 14 });
                const mtRes = analyze(wData, 'mid', { ma: 50, rsi: 14, stoch: 14 });
                const ltRes = analyze(mData, 'long', { ma: 20, rsi: 14, stoch: 14 });
                
                const summaries = { short: { s: "단기 모멘텀 및 심리 지표 기반", a: "" }, mid: { s: "중기 추세 및 모멘텀 기반", a: "" }, long: { s: "장기 사이클 및 평균 회귀 기반", a: "" } };

                const updateUI = (prefix) => {
                    const targetDetails = prefix === 'stock' ? analysisDetails : cryptoAnalysisDetails;
                    targetDetails.short = {...stRes, summary: summaries.short.s};
                    targetDetails.mid = {...mtRes, summary: summaries.mid.s};
                    targetDetails.long = {...ltRes, summary: summaries.long.s};

                    const upBox = (id, res, barId) => { 
                        const el = document.getElementById(id); const bar = document.getElementById(barId);
                        if(el) { el.innerText = res.status; el.className = `text-sm md:text-base font-black italic status-${String(res.status).replace(/ /g, '-')} uppercase mb-1`; }
                        if(bar) {
                            bar.style.width = `${res.pct}%`;
                            if (res.status.includes('BUY')) bar.style.backgroundColor = '#26A69A';
                            else if (res.status.includes('BYE')) bar.style.backgroundColor = '#EF5350';
                            else bar.style.backgroundColor = '#9CA3AF';
                        }
                    };
                    if(prefix === 'stock') { upBox('st-signal-text', stRes, 'st-score-bar'); upBox('mt-signal-text', mtRes, 'mt-score-bar'); upBox('lt-signal-text', ltRes, 'lt-score-bar'); } 
                    else { upBox('crypto-st-signal-text', stRes, 'crypto-st-score-bar'); upBox('crypto-mt-signal-text', mtRes, 'crypto-mt-score-bar'); upBox('crypto-lt-signal-text', ltRes, 'crypto-lt-score-bar'); }
                };

                updateUI(marketType);

                panelData[marketType] = { short: { res: stRes }, mid: { res: mtRes }, long: { res: ltRes } };
                const targetHorizon = marketType === 'stock' ? currentStockHorizon : currentCryptoHorizon;
                renderIndicatorPanel(marketType, targetHorizon);

            } catch (e) { 
                logError("Calculate Signals Error", e, "calculateTriplePerspectiveDecision"); 
                const summaryEl = document.getElementById(`${marketType}-signal-summary`);
                if(summaryEl) summaryEl.innerHTML = `<span class="text-rose-500 text-[0.6rem] font-bold">AI 분석 실패 (API 오류)</span>`;

        async function runLiveCalc(pfKey) {
            const area = document.getElementById('pf-modal-live-area');
            const loading = document.getElementById('pf-live-loading');
            const content = document.getElementById('pf-live-content');
            const tbody = document.getElementById('pf-live-table');
            const summaryBox = document.getElementById('pf-live-summary');
            
            if(!area) return;
            area.style.display = 'block'; loading.style.display = 'flex'; content.style.display = 'none';
            if(summaryBox) summaryBox.style.display = 'none'; tbody.innerHTML = '';

            try {
                let tickers = []; let colCount = 7;
                if(pfKey === 'dual') { tickers = ['SPY', 'VEA', 'BIL', 'QQQ']; colCount = 7; } 
                else if(pfKey === 'vaa') { tickers = ['SPY', 'VEA', 'VWO', 'AGG', 'LQD', 'IEF', 'SHY', 'QQQ']; colCount = 8; } 
                else if(pfKey === 'daa') { tickers = ['VWO', 'BND', 'SPY', 'VEA', 'SHY', 'QQQ']; colCount = 7; } 
                else if(pfKey === 'baa') { tickers = ['SPY', 'VEA', 'VWO', 'BND', 'QQQ', 'BIL', 'IEF', 'TLT']; colCount = 6; } 

                document.getElementById('pf-live-loading-text').innerText = `데이터 수집 중 (다중 서버 우회)...`;
                
                const results = [];
                for (let t of tickers) {
                    results.push(await fetchStockData(t, '1mo', '2y'));
                    await delay(300);
                }
                
                const dataMap = {}; let minLength = 9999;
                for(let i=0; i<tickers.length; i++) {
                    const t = tickers[i];
                    let { dates, closes } = extractCleanData(results[i]);
                    dataMap[t] = { dates, closes };
                    if(closes.length < minLength) minLength = closes.length;
                }

                if(minLength < 13) throw new Error("과거 데이터가 충분하지 않습니다 (12개월 미만)");

                let html = '<thead><tr><th class="text-left">투자 월</th>';
                if(pfKey === 'dual') html += `<th>SPY 12M수익</th><th>VEA 12M수익</th><th>BIL 12M수익</th>`;
                else if(pfKey === 'vaa') html += `<th>SPY 점수</th><th>VEA 점수</th><th>VWO 점수</th><th>AGG 점수</th>`;
                else if(pfKey === 'daa') html += `<th>VWO 점수</th><th>BND 점수</th><th>위험?</th>`;
                else if(pfKey === 'baa') html += `<th>최저 카나리아</th><th>안전 대피?</th>`;
                html += `<th>월간 수익률</th><th>SPY / QQQ</th><th class="text-right">투자 비중</th></tr></thead><tbody>`;

                const getSignal = (idx) => {
                    if(idx - 12 < 0) return null;
                    let result = { assets: [], text: '', proofs:[], color: '' };
                    
                    const calcScore = (t) => {
                        const arr = dataMap[t].closes;
                        const P0 = arr[idx], P1 = arr[idx-1], P3 = arr[idx-3], P6 = arr[idx-6], P12 = arr[idx-12];
                        if(!P0 || !P1 || !P3 || !P6 || !P12) return { score: -999, proof: `<span class="text-rose-400">[${t}] 데이터 부족</span>` };
                        const r1 = (P0/P1 - 1), r3 = (P0/P3 - 1), r6 = (P0/P6 - 1), r12 = (P0/P12 - 1);
                        const score = (r1*12 + r3*4 + r6*2 + r12*1) * 100;
                        const proof = `[${t}] 스코어: ${score.toFixed(2)}`;
                        return { score, proof };
                    };

                    const calcRet = (t) => {
                        const arr = dataMap[t].closes; const P0 = arr[idx], P12 = arr[idx-12];
                        if(!P0 || !P12) return { ret: -999, proof: `<span class="text-rose-400">[${t}] 데이터 부족</span>` };
                        const ret = (P0/P12 - 1) * 100;
                        const proof = `[${t}] 12M 수익: ${ret.toFixed(2)}%`;
                        return { ret, proof };
                    };

                    if(pfKey === 'dual') {
                        const s = calcRet('SPY'), v = calcRet('VEA'), b = calcRet('BIL');
                        result.proofs.push(s.proof, v.proof, b.proof); result.raw = { s, v, b };
                        if(s.ret === -999 || v.ret === -999 || b.ret === -999) return null;
                        if(s.ret < b.ret && v.ret < b.ret) { result.assets=[{t:'BIL', w:1}]; result.text='BIL 100%'; result.color='text-gray-400'; }
                        else if(s.ret > v.ret) { result.assets=[{t:'SPY', w:1}]; result.text='SPY 100%'; result.color='text-up'; }
                        else { result.assets=[{t:'VEA', w:1}]; result.text='VEA 100%'; result.color='text-accent'; }
                    }
                    else if(pfKey === 'vaa') {
                        const ss=calcScore('SPY'), vs=calcScore('VEA'), vws=calcScore('VWO'), as=calcScore('AGG');
                        result.proofs.push(ss.proof, vs.proof, vws.proof, as.proof); result.raw = { ss, vs, vws, as };
                        if(ss.score===-999) return null;
                        if(ss.score>0 && vs.score>0 && vws.score>0 && as.score>0) {
                            const m = Math.max(ss.score, vs.score, vws.score, as.score);
                            const t = ss.score===m?'SPY':(vs.score===m?'VEA':(vws.score===m?'VWO':'AGG'));
                            result.assets=[{t, w:1}]; result.text=`${t} 100% (공격)`; result.color='text-up';
                        } else {
                            const lq=calcScore('LQD'), ie=calcScore('IEF'), sh=calcScore('SHY');
                            result.proofs.push(lq.proof, ie.proof, sh.proof);
                            const m = Math.max(lq.score, ie.score, sh.score);
                            const t = lq.score===m?'LQD':(ie.score===m?'IEF':'SHY');
                            result.assets=[{t, w:1}]; result.text=`${t} 100% (방어)`; result.color='text-gray-400';
                        }
                    }
                    else if(pfKey === 'daa') {
                        const vws=calcScore('VWO'), bns=calcScore('BND');
                        result.proofs.push(vws.proof, bns.proof); result.raw = { vws, bns };
                        if(vws.score===-999) return null;
                        if(vws.score>0 && bns.score>0) {
                            result.assets=[{t:'SPY', w:0.5}, {t:'VEA', w:0.5}]; result.text='SPY 50%, VEA 50%'; result.color='text-up';
                        } else {
                            result.assets=[{t:'SHY', w:1}]; result.text='SHY 100% (방어)'; result.color='text-gray-400';
                        }
                    }
                    else if(pfKey === 'baa') {
                        const ss=calcScore('SPY'), vs=calcScore('VEA'), vws=calcScore('VWO'), bns=calcScore('BND');
                        result.proofs.push(ss.proof, vs.proof, vws.proof, bns.proof); result.raw = { ss, vs, vws, bns };
                        if(ss.score===-999) return null;
                        const minS = Math.min(ss.score, vs.score, vws.score, bns.score);
                        if(minS > 0) {
                            result.assets=[{t:'QQQ', w:1}]; result.text='QQQ 100% (공격)'; result.color='text-up';
                        } else {
                            result.assets=[{t:'BIL', w:0.333}, {t:'IEF', w:0.333}, {t:'TLT', w:0.333}]; result.text='BIL 33%, IEF 33%, TLT 33%'; result.color='text-gray-400';
                        }
                    }
                    return result;
                };

                let actualCagrs = [];
                for(let i = minLength - 1; i >= minLength - 12; i--) {
                    if(i - 12 < 0) break;
                    const sig = getSignal(i); if(!sig) continue;

                    const [yy, mm] = dataMap['SPY'].dates[i].split('-');
                    const ymLabel = `${yy.substring(2)}년 ${parseInt(mm)}월`;
                    let row = `<tr><td class="text-left font-bold text-accent whitespace-nowrap">${ymLabel}</td>`;
                    
                    if(pfKey === 'dual') {
                        const { s, v, b } = sig.raw;
                        row += `<td class="${s.ret>0?'text-up':'text-down'}">${s.ret>0?'+':''}${s.ret.toFixed(2)}%</td><td class="${v.ret>0?'text-up':'text-down'}">${v.ret>0?'+':''}${v.ret.toFixed(2)}%</td><td class="text-gray-400">+${b.ret.toFixed(2)}%</td>`;
                    } else if(pfKey === 'vaa') {
                        const { ss, vs, vws, as } = sig.raw;
                        row += `<td class="${ss.score>0?'text-up':'text-down'}">${ss.score.toFixed(1)}</td><td class="${vs.score>0?'text-up':'text-down'}">${vs.score.toFixed(1)}</td><td class="${vws.score>0?'text-up':'text-down'}">${vws.score.toFixed(1)}</td><td class="${as.score>0?'text-up':'text-down'}">${as.score.toFixed(1)}</td>`;
                    } else if(pfKey === 'daa') {
                        const { vws, bns } = sig.raw; let def = (vws.score <= 0 || bns.score <= 0) ? 'YES (위험)' : 'NO (안전)';
                        row += `<td class="${vws.score>0?'text-up':'text-down'}">${vws.score.toFixed(1)}</td><td class="${bns.score>0?'text-up':'text-down'}">${bns.score.toFixed(1)}</td><td class="${def.includes('YES')?'text-down':'text-up'} font-bold">${def}</td>`;
                    } else if(pfKey === 'baa') {
                        const { ss, vs, vws, bns } = sig.raw; const minS = Math.min(ss.score, vs.score, vws.score, bns.score);
                        let def = minS <= 0 ? 'YES (대피 발동)' : 'NO (안전)';
                        row += `<td class="${minS>0?'text-up':'text-down'} font-bold">${minS.toFixed(1)}</td><td class="${def.includes('YES')?'text-down':'text-up'} font-bold">${def}</td>`;
                    }

                    let actualRetHtml = '<td class="text-gray-400">--</td>', benchRetHtml = '<td class="text-gray-400 bg-black/10">-- / --</td>';
                    if (i < minLength - 1) { 
                        let monRet = 0, hasData = true;
                        for(let asset of sig.assets) {
                            const p0 = dataMap[asset.t].closes[i]; const p1 = dataMap[asset.t].closes[i+1]; 
                            if(p0 && p1) { monRet += asset.w * (p1 / p0 - 1); } else { hasData = false; }
                        }
                        if(hasData) {
                            const retPct = monRet * 100;
                            actualRetHtml = `<td class="${retPct > 0 ? 'text-up' : (retPct < 0 ? 'text-down' : 'text-themeText')} font-bold">${retPct > 0 ? '+' : ''}${retPct.toFixed(2)}%</td>`;
                            actualCagrs.push(retPct); // 순서대로 들어감 (최근 -> 과거)
                        }
                        const spy0 = dataMap['SPY']?.closes[i], spy1 = dataMap['SPY']?.closes[i+1];
                        const qqq0 = dataMap['QQQ']?.closes[i], qqq1 = dataMap['QQQ']?.closes[i+1];
                        let spyStr = '--', qqqStr = '--';
                        if(spy0 && spy1) { const pct = (spy1/spy0 - 1)*100; spyStr = `<span class="${pct>0?'text-up':'text-down'}">${pct>0?'+':''}${pct.toFixed(2)}%</span>`; }
                        if(qqq0 && qqq1) { const pct = (qqq1/qqq0 - 1)*100; qqqStr = `<span class="${pct>0?'text-up':'text-down'}">${pct>0?'+':''}${pct.toFixed(2)}%</span>`; }
                        benchRetHtml = `<td class="text-[0.65rem] font-bold whitespace-nowrap bg-black/10">S: ${spyStr} / Q: ${qqqStr}</td>`;
                    } else {
                        actualRetHtml = '<td class="text-themeMuted text-[0.6rem] font-bold">진행중</td>'; benchRetHtml = '<td class="text-themeMuted text-[0.6rem] font-bold bg-black/10">진행중</td>';
                    }

                    row += actualRetHtml + benchRetHtml + `<td class="text-right font-black ${sig.color}">${sig.text}</td></tr>`;
                    const proofHtml = sig.proofs.map(p => `<div>${p}</div>`).join('');
                    row += `<tr class="proof-row"><td colspan="${colCount}" class="proof-cell"><div class="proof-box">${proofHtml}</div></td></tr>`;
                    html += row;
                }
                html += `</tbody>`; tbody.innerHTML = html;

                if (summaryBox && actualCagrs.length > 0) {
                    let accRet = 1;
                    let equityCurve = [100];
                    
                    // 최근 -> 과거 순이므로, MDD 계산을 위해 과거 -> 최근 순으로 뒤집어서 누적
                    let reversedCagrs = [...actualCagrs].reverse();
                    reversedCagrs.forEach(r => {
                        accRet *= (1 + r/100);
                        equityCurve.push(100 * accRet);
                    });
                    
                    const finalRet = (accRet - 1) * 100;
                    const liveMdds = calcMDDArray(equityCurve);
                    const liveMinMdd = Math.min(...liveMdds);

                    document.getElementById('pf-live-summary-cagr').innerText = `${finalRet>0?'+':''}${finalRet.toFixed(2)}%`;
                    document.getElementById('pf-live-summary-cagr').className = `text-2xl md:text-3xl font-black ${finalRet>0?'text-up':'text-down'}`;
                    
                    document.getElementById('pf-live-summary-mdd').innerText = `${liveMinMdd.toFixed(2)}%`;
                    document.getElementById('pf-live-summary-mdd').className = liveMinMdd < -5 ? 'text-down font-black' : 'text-up font-black';
                    
                    summaryBox.style.display = 'flex';
                }
                loading.style.display = 'none'; content.style.display = 'block';

            } catch (error) {
                logError(`Live Engine Failed (${pfKey})`, error, "runLiveCalc");
                loading.innerHTML = `<p class="text-down text-xs font-bold text-center">API 데이터를 수집하지 못했습니다.<br><span class="text-gray-500 font-normal mt-1 block">${error.message}</span></p>`;
            }
        }

                    { name: 'BAA (3배 TQQQ)', type: 'line', data: getAdjustedSimData('baa_tqqq', true), smooth: true, showSymbol: false, lineStyle: { width: 2, color: '#F97316' } }

        async function runBaaLiveCheck() {
            const idle = document.getElementById('baa-live-idle');
            const loading = document.getElementById('baa-live-loading');
            const resultBox = document.getElementById('baa-live-result');
            const loadingText = document.getElementById('baa-live-loading-text');
            
            idle.style.display = 'none'; resultBox.style.display = 'none'; loading.style.display = 'flex';

            const canaries = ['SPY', 'VEA', 'VWO', 'BND'];
            let minScore = 9999, failureCount = 0;

            try {
                baaProofs = {};
                const results = [];

                for (let ticker of canaries) {
                    loadingText.innerHTML = `데이터 검증 중...<br><span class="text-white mt-2 block text-xs">[${ticker}] 정확한 일봉 데이터 스캔 및 월말 종가 추출 중</span>`;
                    const rawData = await fetchStockData(ticker, '1d', '2y');
                    results.push(rawData);
                    await delay(300); // 딜레이 추가로 에러 방지
                }

                for (let i = 0; i < canaries.length; i++) {
                    const ticker = canaries[i];
                    const rawData = results[i];
                    
                    const ts = rawData.timestamp || [];
                    const quoteClose = rawData.indicators?.quote?.[0]?.close || [];
                    const adjClose = rawData.indicators?.adjclose?.[0]?.adjclose || quoteClose;
                    const livePrice = rawData.meta?.regularMarketPrice;

                    let monthlyData = {};
                    let lastValidClose = 0;

                    for (let j = 0; j < ts.length; j++) {
                        let c = adjClose[j];
                        if (c === null || c === undefined) c = quoteClose[j];
                        if (c === null || c === undefined) c = lastValidClose; else lastValidClose = c;

                        if (c !== 0 && c !== null) {
                            let d = new Date(ts[j] * 1000);
                            let y = d.getUTCFullYear();
                            let m = String(d.getUTCMonth() + 1).padStart(2, '0');
                            let day = String(d.getUTCDate()).padStart(2, '0');
                            let ym = `${y}-${m}`;
                            monthlyData[ym] = { date: `${y}-${m}-${day}`, close: c };
                        }
                    }

                    let sortedMonths = Object.keys(monthlyData).sort();
                    let lastMonthKey = sortedMonths[sortedMonths.length - 1];
                    if (livePrice && monthlyData[lastMonthKey]) {
                        monthlyData[lastMonthKey].close = livePrice;
                    }

                    const len = sortedMonths.length;
                    if(len < 13) throw new Error(`[${ticker}] 데이터 부족 (최소 13개월 필요)`);

                    const M0 = monthlyData[sortedMonths[len - 1]];
                    const M1 = monthlyData[sortedMonths[len - 2]];
                    const M3 = monthlyData[sortedMonths[len - 4]];
                    const M6 = monthlyData[sortedMonths[len - 7]];
                    const M12 = monthlyData[sortedMonths[len - 13]];

                    const P0 = M0.close; const D0 = M0.date;
                    const P1 = M1.close; const D1 = M1.date;
                    const P3 = M3.close; const D3 = M3.date;
                    const P6 = M6.close; const D6 = M6.date;
                    const P12 = M12.close; const D12 = M12.date;

                    if(!P0 || !P1 || !P3 || !P6 || !P12) throw new Error(`[${ticker}] 월말 종가 추출 실패`);
                    
                    const r1 = (P0/P1 - 1); const s1 = r1 * 12 * 100;
                    const r3 = (P0/P3 - 1); const s3 = r3 * 4 * 100;
                    const r6 = (P0/P6 - 1); const s6 = r6 * 2 * 100;
                    const r12 = (P0/P12 - 1); const s12 = r12 * 1 * 100;
                    
                    const score = s1 + s3 + s6 + s12;
                    
                    if (score < minScore) minScore = score;
                    if (score <= 0) failureCount++;

                    const mkRow = (label, pastDate, pastPrice, ret, weight, wScore) => `
                        <tr class="border-b border-themeBorder/30 hover:bg-white/5 transition">
                            <td class="py-2 text-left text-xs text-themeMuted whitespace-nowrap">${label}</td>

                            <td class="py-2 text-right text-xs font-mono text-themeText font-bold">$${pastPrice.toFixed(2)}</td>
                            <td class="py-2 text-right text-[0.7rem] font-mono ${ret>0?'text-up':'text-down'}">${(ret*100).toFixed(2)}%</td>
                            <td class="py-2 text-center text-[0.7rem] text-accent font-black">x${weight}</td>
                            <td class="py-2 text-right text-xs font-mono ${wScore>0?'text-up':'text-down'} font-bold">${wScore.toFixed(2)}</td>
                        </tr>
                    `;

                    baaProofs[ticker] = `
                        <div class="space-y-4 text-sm text-themeText">
                            <div class="bg-black/20 p-4 rounded-xl border border-themeBorder shadow-inner relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-2 opacity-10"><svg class="w-16 h-16 text-themeText" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
                                <div class="flex justify-between items-center mb-1">
                                    <span class="font-black text-themeText text-lg flex items-center gap-2">
                                        ${ticker} <span class="text-[0.6rem] bg-accent/20 text-accent px-2 py-0.5 rounded uppercase tracking-widest border border-accent/30">현재(실시간) 종가</span>
                                    </span>
                                    <span class="font-mono font-black text-themeText text-2xl">$${P0.toFixed(2)}</span>
                                </div>
                                <p class="text-[0.65rem] text-themeMuted text-right">최근 기준일: ${D0}</p>
                            </div>
                            
                            <div class="overflow-x-auto custom-scroll border border-themeBorder rounded-xl bg-black/10">
                                <table class="w-full text-sm min-w-[380px]">
                                    <thead class="bg-black/30">
                                        <tr class="text-[0.6rem] text-themeMuted uppercase tracking-widest border-b border-themeBorder">
                                            <th class="py-2 px-2 text-left">기간</th>
                                            <th class="py-2 text-center text-emerald-400">정확한 월말 날짜</th>
                                            <th class="py-2 text-right">배당반영 종가</th>
                                            <th class="py-2 text-right">수익률(R)</th>
                                            <th class="py-2 text-center">가중치</th>
                                            <th class="py-2 px-2 text-right">점수(R×W)</th>
                                        </tr>
                                    </thead>
                                    <tbody class="px-2">
                                        ${mkRow('1개월 전', D1, P1, r1, 12, s1)}
                                        ${mkRow('3개월 전', D3, P3, r3, 4, s3)}
                                        ${mkRow('6개월 전', D6, P6, r6, 2, s6)}
                                        ${mkRow('12개월 전', D12, P12, r12, 1, s12)}
                                    </tbody>
                                </table>
                            </div>

                            <div class="bg-black/40 p-4 rounded-xl border ${score>0?'border-up':'border-down'} text-center shadow-inner relative mt-2">
                                <div class="absolute top-2 left-3 text-[0.6rem] text-themeMuted font-bold uppercase tracking-widest">최종 모멘텀 합산 스코어</div>
                                <div class="text-[0.65rem] text-gray-500 font-mono mb-1 mt-5 break-keep">
                                    (${s1.toFixed(2)}) + (${s3.toFixed(2)}) + (${s6.toFixed(2)}) + (${s12.toFixed(2)})
                                </div>
                                <div class="text-3xl font-black ${score>0?'text-up':'text-down'}">${score.toFixed(2)} <span class="text-sm font-bold text-themeMuted ml-1">점</span></div>
                            </div>
                        </div>
                    `;

                    const boxEl = document.getElementById(`canary-${ticker}`);
                    if(boxEl) {
                        const scoreEl = boxEl.querySelector('.canary-score');
                        if (scoreEl) { scoreEl.innerText = score.toFixed(1); scoreEl.className = `text-lg font-black mt-1 canary-score ${score > 0 ? 'text-up' : 'text-down'}`; }
                    }
                }

                function getNextRebalanceKST() {
                    let now = new Date(); let year = now.getFullYear(); let month = now.getMonth(); 
                    let lastDay = new Date(year, month + 1, 0);
                    let dayOfWeek = lastDay.getDay();
                    if (dayOfWeek === 0) lastDay.setDate(lastDay.getDate() - 2); else if (dayOfWeek === 6) lastDay.setDate(lastDay.getDate() - 1);
                    let rebalanceDate = new Date(lastDay); rebalanceDate.setDate(rebalanceDate.getDate() + 1);
                    let isDST = (month >= 2 && month <= 10); let hour = isDST ? "05:00" : "06:00";
                    return `${rebalanceDate.getFullYear()}년 ${rebalanceDate.getMonth() + 1}월 ${rebalanceDate.getDate()}일 오전 ${hour}`;
                }

                const titleEl = document.getElementById('baa-decision-title');
                const descEl = document.getElementById('baa-decision-desc');
                const boxEl = document.getElementById('baa-decision-box');
                const rebEl = document.getElementById('baa-rebalance-info');

                if (minScore > 0) {
                    titleEl.innerText = "🟢 공격 모드 (나스닥 몰빵)"; titleEl.className = "text-2xl md:text-3xl font-black mb-2 text-up";
                    descEl.innerHTML = "모든 카나리아 자산 생존! <strong>QQQ 100%</strong> 포지션을 유지하세요."; boxEl.style.borderColor = "#26A69A";
                } else {
                    titleEl.innerText = "🔴 방어 모드 (안전 자산 대피)"; titleEl.className = "text-2xl md:text-3xl font-black mb-2 text-down";
                    descEl.innerHTML = "위험 감지! 즉시 모든 주식을 팔고 <strong>안전자산 3종</strong>으로 대피하세요."; boxEl.style.borderColor = "#EF5350";
                }

                if(rebEl) rebEl.innerText = getNextRebalanceKST();
                loading.style.display = 'none'; resultBox.style.display = 'block';

            } catch (error) {
                console.error("BAA Error", error);
                loading.style.display = 'none'; idle.style.display = 'block';
                idle.innerHTML = `<p class="text-down font-bold text-sm">데이터를 불러오지 못했습니다.<br><span class="text-xs text-gray-500 font-normal mt-1 block">${error.message}</span></p>`;
            }
        }

        function showBaaProof(ticker) {
            if(!baaProofs[ticker]) return;
            document.getElementById('modal-title').innerText = `${ticker} 모멘텀 계산 증명`;
            document.getElementById('modal-period').innerText = 'BAA 카나리아 알고리즘 (13612 공식)';
            document.getElementById('modal-body').innerHTML = baaProofs[ticker];
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function toggleMode(el) {
            isBeginnerMode = el.checked;
            const deskSwitch = document.getElementById('mode-switch'); if(deskSwitch) deskSwitch.checked = isBeginnerMode;
            const mobSwitch = document.getElementById('mob-mode-switch'); if(mobSwitch) mobSwitch.checked = isBeginnerMode;
            document.body.classList.toggle('beginner-mode', isBeginnerMode);
            safeStorageSet('dashboardMode', isBeginnerMode ? 'beginner' : 'expert');
            updateSummaryUI('stock'); updateSummaryUI('crypto');
        }

        function openStatInfo(type, marketType) {
            const info = DESCRIPTIONS[type];
            if(!info) return;
            document.getElementById('info-title').innerHTML = `<svg class="icon-md mr-2 text-accent" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01"></path></svg>` + (TERMS[type] ? TERMS[type].expert : type);
            document.getElementById('info-body').innerText = isBeginnerMode ? info.beginner : info.expert;
            document.getElementById('info-modal').style.display = 'flex';
        }

        function resetDashboard() { location.reload(); }
        function updateStatus(t, c) { const l = document.getElementById('conn-label'), d = document.getElementById('status-dot'); if(l) { l.innerText = t; d.className = `w-2 h-2 rounded-full ${c}`; } }
        function updateCryptoStatus(t, c) { const l = document.getElementById('crypto-conn-label'), d = document.getElementById('crypto-status-dot'); if(l) { l.innerText = t; d.className = `w-2 h-2 rounded-full ${c}`; } }
        function openErrorModal() { document.getElementById('error-log-text').value = errorLogs.join('\n---\n') || '에러 없음'; document.getElementById('error-modal').style.display = 'flex'; }
        function closeErrorModal() { document.getElementById('error-modal').style.display = 'none'; }
        function copyErrorLog() { const t = document.getElementById('error-log-text'); t.select(); document.execCommand('copy'); }
        function openSettingsModal() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; }
        function closeDetailModal() { document.getElementById('detail-modal').style.display = 'none'; }
        function closePfDetailModal() { document.getElementById('pf-detail-modal').style.display = 'none'; }
        function closeInfoModal() { document.getElementById('info-modal').style.display = 'none'; }

        function toggleCurrency() {
            currentCurrency = currentCurrency === 'USD' ? 'KRW' : 'USD';
            safeStorageSet('dashboardCurrency', currentCurrency);
            const btn = document.getElementById('currency-toggle');
            if(btn) btn.innerHTML = currentCurrency === 'USD' ? '🇺🇸 USD' : '🇰🇷 KRW';
            if(globalTicker) loadData(globalTicker);
            if(globalCryptoTicker) loadCryptoData(globalCryptoTicker);
            
            updatePfCardMetrics(); 
            if(pfChart) renderPortfolioChart(); 
            if(baaChart) renderBaaChart();
        }

        function toggleProofs(show) { document.querySelectorAll('.proof-row').forEach(r => show ? r.classList.add('show') : r.classList.remove('show')); }

        function setTheme(t) {
            document.documentElement.className = t; safeStorageSet('dashboardTheme', t);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${t}`)?.classList.add('active');
            requestAnimationFrame(() => {
                if(globalChartData && myChart) renderDashboard(globalTicker, globalChartData);
                if(globalCryptoChartData && cryptoChart) renderCryptoDashboard(globalCryptoTicker, globalCryptoChartData);
                if(pfChart) renderPortfolioChart(); if(pfPieChart) pfPieChart.resize(); if(pfModalChart) pfModalChart.resize(); if(baaChart) renderBaaChart();
            });
        }

        function setFontSize(s) {
            document.documentElement.style.fontSize = {sm:'14px', md:'16px', lg:'18px'}[s];
            safeStorageSet('dashboardFontSize', s);
            document.querySelectorAll("[id^='btn-font-']").forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-font-${s}`)?.classList.add('active');
            requestAnimationFrame(() => { myChart?.resize(); cryptoChart?.resize(); pfChart?.resize(); pfPieChart?.resize(); pfModalChart?.resize(); baaChart?.resize(); });
        }

        function setLineWidth(w) {
            safeStorageSet('dashboardLineWidth', w);
            document.querySelectorAll("[id^='btn-line-']").forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-line-${w}`)?.classList.add('active');
            if(globalChartData && myChart) renderDashboard(globalTicker, globalChartData);
            if(globalCryptoChartData && cryptoChart) renderCryptoDashboard(globalCryptoTicker, globalCryptoChartData);
        }

        function switchMainTab(tab) {
            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-btn-${tab}`)?.classList.add('active');
            document.getElementById(`mob-tab-btn-${tab}`)?.classList.add('active');
            ['dashboard','crypto','portfolio','baa'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                if(el) el.style.display = v === tab ? 'flex' : 'none';
            });
            setTimeout(() => {
                if(tab === 'dashboard' && myChart) myChart.resize();
                else if(tab === 'crypto') { if(!cryptoChart) { cryptoChart = echarts.init(document.getElementById('crypto-chart-main')); loadCryptoData(globalCryptoTicker); } cryptoChart.resize(); }
                else if(tab === 'portfolio') { if(!pfChart) initPortfolioChart(); pfChart?.resize(); }
                else if(tab === 'baa') {
                    if(!baaChart) initBaaChart(); baaChart?.resize();
                    const idleBox = document.getElementById('baa-live-idle'); if (idleBox && idleBox.style.display !== 'none') runBaaLiveCheck();
                }
            }, 50);
        }

        function toggleMA(p) { maSettings[p] = !maSettings[p]; updateMAButtons(); if(globalChartData) renderDashboard(globalTicker, globalChartData); }
        function toggleCryptoMA(p) { cryptoMaSettings[p] = !cryptoMaSettings[p]; updateCryptoMAButtons(); if(globalCryptoChartData) renderCryptoDashboard(globalCryptoTicker, globalCryptoChartData); }
        function updateMAButtons() { Object.keys(maSettings).forEach(p => { const b = document.getElementById(`btn-ma-${p}`); if(b) maSettings[p] ? b.classList.add('active') : b.classList.remove('active'); }); }
        function updateCryptoMAButtons() { Object.keys(cryptoMaSettings).forEach(p => { const b = document.getElementById(`crypto-btn-ma-${p}`); if(b) cryptoMaSettings[p] ? b.classList.add('active') : b.classList.remove('active'); }); }

        function changeInterval(i, r, l) {
            currentInterval = i; currentRange = r;
            document.querySelectorAll('#view-dashboard .range-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`range-${l}`)?.classList.add('active');
            loadData(globalTicker, i, r);
        }
        function changeCryptoInterval(i, r, l) {
            currentCryptoInterval = i; currentCryptoRange = r;
            document.querySelectorAll('#view-crypto .range-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`crypto-range-${l}`)?.classList.add('active');
            loadCryptoData(globalCryptoTicker, i, r);
        }

        document.addEventListener("DOMContentLoaded", () => {
            window.scrollTo(0, 0);
            if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
            
            try {
                myChart = echarts.init(document.getElementById('chart-main'));
                
                const form = document.getElementById('search-form');
                if(form) { 
                    form.onsubmit = (e) => { 
                        e.preventDefault(); 
                        const t = document.getElementById('ticker-input').value.trim().toUpperCase(); 
                        if(t) { safeStorageSet('lastTicker', t); loadData(t); }
                    }; 
                }

                const cryptoForm = document.getElementById('crypto-search-form');
                if(cryptoForm) { 
                    cryptoForm.onsubmit = (e) => { 
                        e.preventDefault(); 
                        const t = document.getElementById('crypto-ticker-input').value.trim().toUpperCase(); 
                        if(t) { safeStorageSet('lastCryptoTicker', t); loadCryptoData(t); }
                    }; 
                }

                const btn = document.getElementById('currency-toggle');
                if(btn) btn.innerHTML = currentCurrency === 'USD' ? '🇺🇸 USD' : '🇰🇷 KRW';
                
                setTheme(safeStorageGet('dashboardTheme', 'theme-green')); 
                setFontSize(safeStorageGet('dashboardFontSize', 'md'));
                
                isBeginnerMode = (safeStorageGet('dashboardMode', 'expert') === 'beginner');
                const deskSwitch = document.getElementById('mode-switch'); if (deskSwitch) deskSwitch.checked = isBeginnerMode;
                const mobSwitch = document.getElementById('mob-mode-switch'); if (mobSwitch) mobSwitch.checked = isBeginnerMode;
                document.body.classList.toggle('beginner-mode', isBeginnerMode);
                
                updateMAButtons(); updateCryptoMAButtons();
                
                // === FIX: 페이지 로드 시 포트폴리오 카드 MDD / 수익률 즉시 갱신 ===
                updatePfCardMetrics(); 
                
                const savedTicker = safeStorageGet('lastTicker', 'SPY');
                const savedCrypto = safeStorageGet('lastCryptoTicker', 'BTC-USD');
                
                document.getElementById('ticker-input').value = savedTicker;
                document.getElementById('crypto-ticker-input').value = savedCrypto;
                
                // === FIX: API 연속 호출로 인한 에러 방지 (순차적 딜레이 로딩) ===
                setTimeout(() => loadData(savedTicker), 100);
                setTimeout(() => loadCryptoData(savedCrypto), 1500);
                
                setInterval(() => {
                    const activeTab = document.querySelector('.main-tab-btn.active')?.id;
                    if(activeTab === 'tab-btn-dashboard' && globalTicker) loadData(globalTicker, currentInterval, currentRange);
                    else if(activeTab === 'tab-btn-crypto' && globalCryptoTicker) loadCryptoData(globalCryptoTicker, currentCryptoInterval, currentCryptoRange);
                }, 300000); 

            } catch (e) { logError("Init Error", e, "DOMContentLoaded"); }
        });
    </script>
</body>
</html>
